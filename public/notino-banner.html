<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Notino Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; }

.banner {
  width: 680px;
  height: 320px;
  position: relative;
  overflow: hidden;
  background: #030008;
}

/* === DEEP SPACE BACKGROUND === */
.stars {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:.8} }

/* === AURORA WAVES === */
.aurora {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.aurora-band {
  position: absolute;
  width: 200%;
  height: 180px;
  border-radius: 50%;
  filter: blur(40px);
  animation: aurora-drift ease-in-out infinite;
}
.ab1 {
  top: -60px;
  left: -50%;
  background: linear-gradient(180deg, transparent, rgba(180,0,100,.45), rgba(100,0,180,.3), transparent);
  animation-duration: 8s;
  animation-delay: 0s;
}
.ab2 {
  top: 80px;
  left: -30%;
  background: linear-gradient(180deg, transparent, rgba(233,30,140,.3), rgba(60,0,120,.25), transparent);
  animation-duration: 10s;
  animation-delay: -3s;
}
.ab3 {
  bottom: -40px;
  left: -60%;
  background: linear-gradient(0deg, transparent, rgba(150,0,80,.35), rgba(80,0,200,.2), transparent);
  animation-duration: 7s;
  animation-delay: -5s;
}
@keyframes aurora-drift {
  0%   { transform: translateX(0%) scaleY(1); opacity: .6; }
  33%  { transform: translateX(15%) scaleY(1.2); opacity: 1; }
  66%  { transform: translateX(5%) scaleY(.9); opacity: .7; }
  100% { transform: translateX(0%) scaleY(1); opacity: .6; }
}

/* === LIGHT BEAMS === */
.beam {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;
  background: linear-gradient(180deg, transparent 0%, rgba(233,30,140,.6) 30%, rgba(255,100,180,.9) 50%, rgba(233,30,140,.6) 70%, transparent 100%);
  filter: blur(1px);
  animation: beam-scan linear infinite;
}
.beam1 { left: 60%; animation-duration: 6s; animation-delay: 0s; }
.beam2 { left: 55%; width: 1px; animation-duration: 9s; animation-delay: -2s; opacity: .4; }
.beam3 { left: 65%; width: 3px; animation-duration: 7s; animation-delay: -4s; filter: blur(3px); opacity: .3; }
@keyframes beam-scan {
  0%   { opacity: 0; transform: translateX(0); }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(120px); }
}

/* === BOKEH ORBS === */
.bokeh {
  position: absolute;
  border-radius: 50%;
  filter: blur(8px);
  animation: bokeh-float ease-in-out infinite;
}
.bk1 { width:80px; height:80px; top:10%; left:42%; background:rgba(233,30,140,.15); animation-duration:8s; animation-delay:0s; }
.bk2 { width:50px; height:50px; top:50%; left:50%; background:rgba(180,0,120,.2); animation-duration:11s; animation-delay:-3s; }
.bk3 { width:120px; height:120px; top:-20%; left:55%; background:rgba(100,0,180,.1); animation-duration:9s; animation-delay:-6s; filter:blur(20px); }
.bk4 { width:40px; height:40px; bottom:10%; left:60%; background:rgba(255,50,150,.15); animation-duration:6s; animation-delay:-1s; }
@keyframes bokeh-float {
  0%,100% { transform: translateY(0) scale(1); opacity: .6; }
  50%      { transform: translateY(-20px) scale(1.15); opacity: 1; }
}

/* === SCAN LINES (luxury feel) === */
.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,.08) 3px,
    rgba(0,0,0,.08) 4px
  );
  pointer-events: none;
  z-index: 9;
}

/* === WOMAN === */
.woman-wrap {
  position: absolute;
  right: 0;
  top: 0;
  width: 310px;
  height: 100%;
  z-index: 5;
  animation: woman-enter 1.4s cubic-bezier(.16,1,.3,1) .3s both;
}
@keyframes woman-enter {
  from { transform: translateX(140px) scale(.95); opacity: 0; filter: brightness(1.5); }
  to   { transform: translateX(0) scale(1); opacity: 1; filter: brightness(1); }
}
.woman-wrap img {
  height: 100%;
  width: 100%;
  object-fit: cover;
  object-position: top center;
  animation: float 7s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }

/* Fade edges of woman */
.woman-fade-l {
  position: absolute;
  left: 0; top: 0;
  width: 100px; height: 100%;
  background: linear-gradient(to right, #030008 0%, transparent 100%);
  z-index: 6;
}
.woman-fade-b {
  position: absolute;
  left: 0; bottom: 0;
  width: 100%; height: 60px;
  background: linear-gradient(to top, #030008, transparent);
  z-index: 6;
}
/* Glowing halo around woman */
.woman-halo {
  position: absolute;
  right: -30px;
  top: 50%;
  transform: translateY(-50%);
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(233,30,140,.18) 0%, transparent 65%);
  border-radius: 50%;
  animation: halo-pulse 4s ease-in-out infinite;
  z-index: 4;
}
@keyframes halo-pulse { 0%,100%{opacity:.5;transform:translateY(-50%) scale(1)} 50%{opacity:1;transform:translateY(-50%) scale(1.1)} }

/* === LEFT FADE === */
.left-fade {
  position: absolute;
  left: 0; top: 0;
  width: 320px; height: 100%;
  background: linear-gradient(to right, #030008 15%, transparent 100%);
  z-index: 7;
  pointer-events: none;
}

/* === CONTENT === */
.content {
  position: absolute;
  left: 48px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
}

/* NEW badge */
.new-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 12px;
  animation: reveal .8s .5s both;
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #e91e8c;
  box-shadow: 0 0 0 0 rgba(233,30,140,.7);
  animation: pulse-ring 1.8s ease-out infinite;
}
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(233,30,140,.7); }
  70%  { box-shadow: 0 0 0 8px rgba(233,30,140,0); }
  100% { box-shadow: 0 0 0 0 rgba(233,30,140,0); }
}
.new-text {
  font-family: 'Montserrat', sans-serif;
  font-size: 7.5px;
  font-weight: 600;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
}
.new-text span { color: #e91e8c; }

/* Logo with shimmer */
.logo-wrap {
  position: relative;
  animation: reveal .9s .7s both;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 76px;
  font-weight: 300;
  color: #fff;
  line-height: .95;
  letter-spacing: -3px;
  position: relative;
  text-shadow:
    0 0 40px rgba(233,30,140,.25),
    0 0 80px rgba(233,30,140,.1);
}
.logo em {
  color: #e91e8c;
  font-style: italic;
  text-shadow:
    0 0 20px rgba(233,30,140,.8),
    0 0 40px rgba(233,30,140,.4);
}
.logo-shimmer {
  position: absolute;
  top: 0; left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.15) 50%, transparent 70%);
  animation: shimmer 5s ease-in-out 2s infinite;
}
@keyframes shimmer { 0%{left:-100%} 30%,100%{left:200%} }

.tagline {
  font-family: 'Montserrat', sans-serif;
  font-size: 9px;
  font-weight: 200;
  letter-spacing: 4px;
  color: rgba(255,255,255,.3);
  text-transform: uppercase;
  margin-top: 5px;
  animation: reveal .9s .9s both;
}

/* Animated separator */
.sep {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 14px 0 13px;
  animation: reveal .8s 1.1s both;
}
.sep-line {
  height: 1px;
  background: linear-gradient(90deg, #e91e8c, rgba(233,30,140,.3));
  animation: expand-line .9s 1.2s both;
}
@keyframes expand-line { from{width:0} to{width:110px} }
.sep-diamond {
  width: 5px; height: 5px;
  background: #e91e8c;
  transform: rotate(45deg);
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(233,30,140,.8);
  animation: reveal .4s 1.7s both;
}

.cta-line {
  font-family: 'Montserrat', sans-serif;
  font-size: 10.5px;
  font-weight: 300;
  color: rgba(255,255,255,.5);
  animation: reveal .9s 1.4s both;
}
.cta-line strong {
  color: #f472b6;
  font-weight: 600;
  text-shadow: 0 0 12px rgba(233,30,140,.5);
}

@keyframes reveal {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* === PARTICLES === */
.pt {
  position: absolute;
  border-radius: 50%;
  background: #e91e8c;
  pointer-events: none;
  animation: rise-up linear infinite;
}
@keyframes rise-up {
  0%   { transform:translateY(340px) scale(0); opacity:0; }
  10%  { opacity:.7; }
  90%  { opacity:.15; }
  100% { transform:translateY(-20px) scale(1.5); opacity:0; }
}

/* === CORNER FRAMES === */
.corner { position:absolute; border-color:rgba(233,30,140,.5); border-style:solid; animation: corner-in .6s ease both; }
.tl{top:12px;left:12px;width:24px;height:24px;border-width:1.5px 0 0 1.5px;animation-delay:1.8s}
.tr{top:12px;right:12px;width:24px;height:24px;border-width:1.5px 1.5px 0 0;animation-delay:1.9s}
.bl{bottom:12px;left:12px;width:24px;height:24px;border-width:0 0 1.5px 1.5px;animation-delay:2.0s}
.br{bottom:12px;right:12px;width:24px;height:24px;border-width:0 1.5px 1.5px 0;animation-delay:2.1s}
@keyframes corner-in { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }

/* Side accent line */
.accent-line {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 0;
  background: linear-gradient(180deg, transparent, #e91e8c, transparent);
  animation: accent-grow .8s 1.5s both;
  z-index: 11;
}
@keyframes accent-grow { from{height:0} to{height:60%} }
</style>
</head>
<body>
<div class="banner">

  <!-- Background layers -->
  <div class="stars" id="stars"></div>
  <div class="aurora">
    <div class="aurora-band ab1"></div>
    <div class="aurora-band ab2"></div>
    <div class="aurora-band ab3"></div>
  </div>
  <div class="bokeh bk1"></div>
  <div class="bokeh bk2"></div>
  <div class="bokeh bk3"></div>
  <div class="bokeh bk4"></div>
  <div class="beam beam1"></div>
  <div class="beam beam2"></div>
  <div class="beam beam3"></div>

  <!-- Particles -->
  <div class="pt" style="width:2px;height:2px;left:48%;animation-duration:8s;animation-delay:0s"></div>
