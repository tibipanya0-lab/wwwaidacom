<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Answear Banner Mobil</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;}

.banner{
  width:390px;height:680px;
  position:relative;overflow:hidden;
  background:#faf8f5;
}

.bg-color{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#fff5e6 0%,#ffecd2 25%,#fff0f5 55%,#f0f8ff 100%);
}
.stripes{
  position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(255,140,0,.04) 18px,rgba(255,140,0,.04) 19px);
}

.blob{position:absolute;border-radius:50%;filter:blur(40px);animation:blob-move ease-in-out infinite;}
.bl1{width:250px;height:250px;top:-60px;left:10%;background:rgba(255,140,0,.2);animation-duration:8s;}
.bl2{width:180px;height:180px;top:35%;left:50%;background:rgba(0,180,200,.15);animation-duration:11s;animation-delay:-3s;}
.bl3{width:220px;height:220px;bottom:-40px;left:20%;background:rgba(230,60,60,.14);animation-duration:9s;animation-delay:-5s;}
@keyframes blob-move{
  0%,100%{transform:translate(0,0) scale(1);opacity:.7;}
  33%{transform:translate(20px,-20px) scale(1.1);opacity:1;}
  66%{transform:translate(-15px,12px) scale(.95);opacity:.8;}
}

/* Horizontal streaks for mobile */
.streak{position:absolute;height:2px;width:100%;animation:streak-h linear infinite;opacity:0;}
.sk1{top:70%;background:linear-gradient(90deg,transparent,rgba(255,120,0,.5),transparent);animation-duration:5s;}
.sk2{top:78%;background:linear-gradient(90deg,transparent,rgba(0,180,200,.4),transparent);animation-duration:7s;animation-delay:-2s;}
@keyframes streak-h{
  0%{transform:translateX(-100%);opacity:0;}5%{opacity:1;}95%{opacity:1;}100%{transform:translateX(100%);opacity:0;}
}

/* Confetti */
.dot{position:absolute;border-radius:50%;animation:dot-float ease-in-out infinite;}
.d1{width:8px;height:8px;top:68%;left:15%;background:#ff8c00;animation-duration:4s;}
.d2{width:5px;height:5px;top:72%;left:75%;background:#00b4c8;animation-duration:6s;animation-delay:-2s;}
.d3{width:6px;height:6px;top:65%;left:45%;background:#e63c3c;animation-duration:5s;animation-delay:-1s;}
.d4{width:4px;height:4px;top:80%;left:60%;background:#ffc800;animation-duration:7s;animation-delay:-3s;}
@keyframes dot-float{
  0%,100%{transform:translateY(0) rotate(0deg);opacity:.8;}
  50%{transform:translateY(-15px) rotate(180deg);opacity:1;}
}

/* Woman — top 65% */
.woman-wrap{
  position:absolute;top:0;left:0;right:0;
  height:66%;z-index:5;
  animation:woman-enter 1.3s cubic-bezier(.16,1,.3,1) .2s both;
}
@keyframes woman-enter{
  from{transform:translateY(-70px) scale(.96);opacity:0;}
  to{transform:translateY(0) scale(1);opacity:1;}
}
.woman-wrap img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  animation:float 7s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.woman-fade-b{
  position:absolute;left:0;bottom:0;
  width:100%;height:180px;
  background:linear-gradient(to top,#faf8f5 20%,rgba(250,248,245,.6) 60%,transparent);
  z-index:6;
}
.woman-fade-sides{
  position:absolute;inset:0;
  background:linear-gradient(to right,#faf8f5 0%,transparent 8%,transparent 92%,#faf8f5 100%);
  z-index:6;
}

/* Content — bottom 38% */
.content{
  position:absolute;
  bottom:0;left:0;right:0;
  height:40%;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 28px 28px;text-align:center;
}

.badge{
  display:inline-flex;align-items:center;gap:8px;
  margin-bottom:12px;
  animation:reveal .8s .6s both;
}
.badge-pill{
  background:linear-gradient(135deg,#ff8c00,#e63c3c);
  color:#fff;font-family:'Montserrat',sans-serif;
  font-size:8px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;
}
.badge-tag{
  font-family:'Montserrat',sans-serif;
  font-size:8px;font-weight:300;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(0,0,0,.4);
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:76px;font-weight:700;
  line-height:.95;letter-spacing:-2px;
  background:linear-gradient(135deg,#1a1a1a 0%,#3a1a00 50%,#1a1a1a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
  animation:reveal .9s .8s both;
}
.logo-shimmer{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(105deg,transparent 30%,rgba(255,200,100,.3) 50%,transparent 70%);
  animation:shimmer 5s ease-in-out 2.5s infinite;
}
@keyframes shimmer{0%{left:-100%}30%,100%{left:200%}}

.tagline{
  font-family:'Montserrat',sans-serif;
  font-size:9px;font-weight:200;
  letter-spacing:4px;text-transform:uppercase;
  color:rgba(0,0,0,.32);
  margin-top:5px;
  animation:reveal .9s 1s both;
}

.sep{
  display:flex;align-items:center;gap:10px;
  margin:13px 0 11px;
  animation:reveal .8s 1.2s both;
}
.sep-line{
  height:1.5px;
  background:linear-gradient(90deg,transparent,#ff8c00,#e63c3c,transparent);
  animation:expand-lc .9s 1.3s both;
}
@keyframes expand-lc{from{width:0}to{width:80px}}
.sep-sq{
  width:6px;height:6px;
  background:linear-gradient(135deg,#ff8c00,#e63c3c);
  transform:rotate(45deg);flex-shrink:0;
  box-shadow:0 0 8px rgba(255,140,0,.7);
  animation:fade-in .5s 1.8s both;
}
@keyframes fade-in{from{opacity:0}to{opacity:1}}

.cta{
  font-family:'Montserrat',sans-serif;
  font-size:11px;font-weight:300;
  color:rgba(0,0,0,.48);
  animation:reveal .9s 1.5s both;
}
.cta strong{
  font-weight:700;
  background:linear-gradient(135deg,#ff8c00,#e63c3c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

@keyframes reveal{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}

/* Corners - different colors */
.corner{position:absolute;border-style:solid;animation:corner-in .6s ease both;}
.tl{top:14px;left:14px;width:26px;height:26px;border-color:#ff8c00;border-width:2px 0 0 2px;animation-delay:1.9s;}
.tr{top:14px;right:14px;width:26px;height:26px;border-color:#e63c3c;border-width:2px 2px 0 0;animation-delay:2s;}
.bl{bottom:14px;left:14px;width:26px;height:26px;border-color:#00b4c8;border-width:0 0 2px 2px;animation-delay:2.1s;}
.br{bottom:14px;right:14px;width:26px;height:26px;border-color:#ffc800;border-width:0 2px 2px 0;animation-delay:2.2s;}
@keyframes corner-in{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}

/* Animated rainbow bottom bar */
.color-bar{
  position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#ff8c00,#e63c3c,#ffc800,#00b4c8,#ff8c00);
  background-size:200% 100%;
  animation:bar-shift 3s linear infinite;
  z-index:11;
}
@keyframes bar-shift{from{background-position:0%}to{background-position:200%}}

/* Top accent */
.accent-top{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:4px;
  background:linear-gradient(90deg,transparent,#ff8c00,#e63c3c,transparent);
  animation:accent-w .8s 1.6s both;
  z-index:11;
}
@keyframes accent-w{from{width:0}to{width:55%}}
</style>
</head>
