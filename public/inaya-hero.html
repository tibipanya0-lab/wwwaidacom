<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inaya AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; }

  #video-wrap {
    position:fixed; inset:0; z-index:1;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #video-container { position:relative; }
  #bg-video { width:100%; height:100%; display:block; }

  .holo-unit {
    position:absolute; z-index:5;
    display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none;
    transform:translate(-50%,-50%);
  }
  .holo-unit.float { opacity:1; pointer-events:all; }
  @keyframes unitAppear {
    0%  { opacity:0; transform:translate(-50%,-50%) scale(0.3) translateY(25px); }
    60% { opacity:1; transform:translate(-50%,-50%) scale(1.08) translateY(-5px); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1) translateY(0); }
  }

  .holo-orb {
    width:54px; height:54px; border-radius:50%;
    background:radial-gradient(circle, rgba(0,220,255,0.28) 0%, transparent 70%);
    border:1.5px solid rgba(0,220,255,0.7);
    box-shadow:0 0 16px rgba(0,200,255,0.65), 0 0 35px rgba(0,150,255,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; position:relative; flex-shrink:0;
    animation:orbPulse 2.2s ease-in-out infinite;
  }
  .gold .holo-orb {
    border-color:rgba(255,220,50,0.75);
    background:radial-gradient(circle, rgba(255,200,0,0.22) 0%, transparent 70%);
    box-shadow:0 0 16px rgba(255,200,0,0.6), 0 0 35px rgba(200,150,0,0.3);
    animation:orbPulseGold 2.2s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100%{ box-shadow:0 0 16px rgba(0,200,255,0.65), 0 0 35px rgba(0,150,255,0.3); }
    50%    { box-shadow:0 0 28px rgba(0,220,255,1), 0 0 55px rgba(0,180,255,0.6); }
  }
  @keyframes orbPulseGold {
    0%,100%{ box-shadow:0 0 16px rgba(255,200,0,0.6), 0 0 35px rgba(200,150,0,0.3); }
    50%    { box-shadow:0 0 28px rgba(255,220,0,1), 0 0 55px rgba(200,160,0,0.6); }
  }
  .holo-orb:hover { transform:scale(1.18); }
  .holo-orb::before {
    content:''; position:absolute; inset:-7px; border-radius:50%;
    border:1.5px solid transparent;
    border-top-color:rgba(0,220,255,0.95); border-right-color:rgba(0,220,255,0.35);
    animation:spinCW 1.8s linear infinite;
  }
  .holo-orb::after {
    content:''; position:absolute; inset:-14px; border-radius:50%;
    border:1px solid transparent;
    border-bottom-color:rgba(0,200,255,0.55); border-left-color:rgba(0,200,255,0.2);
    animation:spinCCW 2.8s linear infinite;
  }
  .gold .holo-orb::before { border-top-color:rgba(255,220,50,0.95); border-right-color:rgba(255,200,0,0.35); }
  .gold .holo-orb::after  { border-bottom-color:rgba(255,200,0,0.55); border-left-color:rgba(255,180,0,0.2); }
  @keyframes spinCW  { to { transform:rotate(360deg); } }
  @keyframes spinCCW { to { transform:rotate(-360deg); } }

  .holo-beam {
    width:3px; height:20%; position:relative;
    background:linear-gradient(to bottom, rgba(0,210,255,0.9), rgba(0,150,255,0.15), transparent);
    box-shadow:0 0 10px rgba(0,200,255,0.7); border-radius:0 0 3px 3px; flex-shrink:0;
    animation:beamPulse 2.2s ease-in-out infinite;
  }
  .gold .holo-beam {
    background:linear-gradient(to bottom, rgba(255,210,0,0.9), rgba(150,100,0,0.15), transparent);
    box-shadow:0 0 10px rgba(255,200,0,0.7);
    animation:beamPulseGold 2.2s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100%{opacity:0.7} 50%{opacity:1;box-shadow:0 0 18px rgba(0,220,255,1)} }
  @keyframes beamPulseGold { 0%,100%{opacity:0.7} 50%{opacity:1;box-shadow:0 0 18px rgba(255,220,0,1)} }
  .bp {
    position:absolute; left:50%; margin-left:-2px;
    width:4px; height:4px; border-radius:50%;
    background:#00d4ff; box-shadow:0 0 5px #00d4ff;
    animation:bpDrop 1.8s ease-in-out infinite; opacity:0;
  }
  .gold .bp { background:#ffd000; box-shadow:0 0 5px #ffd000; }
  .bp:nth-child(1){top:8%;animation-delay:0s}
  .bp:nth-child(2){top:32%;animation-delay:0.45s}
  .bp:nth-child(3){top:58%;animation-delay:0.9s}
  .bp:nth-child(4){top:80%;animation-delay:1.35s}
  @keyframes bpDrop {
    0%{opacity:0;transform:translateY(-5px) scale(0.4)}
    35%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(10px) scale(0.2)}
  }

  #table-effect {
    position:absolute;
    left:7.78%; top:75.23%; width:87.26%; height:13.86%;
    z-index:6; pointer-events:none; border-radius:50%;
    background:radial-gradient(ellipse at 50% 50%,
      rgba(255,255,0,1) 0%, rgba(255,210,0,0.9) 25%,
      rgba(255,150,0,0.7) 50%, rgba(255,80,0,0.4) 75%, transparent 100%);
    box-shadow:0 0 40px 15px rgba(255,220,0,0.9), 0 0 80px 30px rgba(255,160,0,0.6);
    animation:firePulse 0.8s ease-in-out infinite;
  }
  @keyframes firePulse { 0%,100%{opacity:0.85;filter:brightness(1.3)} 50%{opacity:1;filter:brightness(1.9)} }

  #fade {
    position:fixed; bottom:0; left:0; right:0; height:30%;
    background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.15) 40%,transparent 70%);
    z-index:8; pointer-events:none;
  }

  /* === GOLD MODAL === */
  #modal-overlay {
    position:fixed; inset:0; z-index:50;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.5);
    animation:modalFadeIn 0.3s ease;
  }
  #modal-overlay.active { display:flex; }
  @keyframes modalFadeIn { from{opacity:0} to{opacity:1} }

  #modal-box {
    width:520px; max-width:90vw; max-height:90vh;
    background:transparent;
    border:1.5px solid rgba(212,160,23,0.6);
    border-radius:20px;
    backdrop-filter:blur(6px);
    box-shadow:0 0 40px rgba(212,160,23,0.35), 0 0 80px rgba(212,160,23,0.15), inset 0 0 30px rgba(212,160,23,0.08), inset 0 1px 0 rgba(255,220,100,0.2);
    padding:28px 24px;
    color:#fff;
    overflow-y:auto;
    animation:modalSlideIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes modalSlideIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

  #modal-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; padding-bottom:12px;
    border-bottom:1px solid rgba(212,160,23,0.25);
  }
  #modal-title {
    font-family:'Orbitron',sans-serif;
    font-size:14px; letter-spacing:3px;
    color:#d4a017;
  }
  #modal-icon { font-size:28px; margin-right:12px; }
  #modal-close {
    width:32px; height:32px; border-radius:50%;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.3);
    color:#d4a017; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #modal-close:hover { background:rgba(212,160,23,0.3); transform:scale(1.1); }
  #modal-body {
    font-family:'Rajdhani',sans-serif;
    font-size:15px; line-height:1.6;
    color:rgba(255,255,255,0.8);
  }
  #modal-body .loading {
    text-align:center; padding:30px;
    color:#d4a017;
  }

  /* === CHAT === */
  #chat-section {
    position:absolute; z-index:10;
    left:50%; top:78%;
    transform:translate(-50%,-50%);
    width:42%; max-width:400px; min-width:260px;
    transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  #chat-section.shifted {
    left:22%; width:34%; max-width:340px; min-width:220px;
  }

  /* === PRODUCT PANEL === */
  #product-panel {
    position:fixed; z-index:40;
    top:5vh; right:-55vw; width:50vw; max-width:600px; height:90vh;
    background:rgba(0,20,60,0.65);
    border:1.5px solid rgba(0,180,255,0.4);
    border-radius:20px 0 0 20px;
    backdrop-filter:blur(14px);
    box-shadow:0 0 40px rgba(0,160,255,0.25), inset 0 0 20px rgba(0,100,255,0.05);
    display:flex; flex-direction:column;
    transition:right 0.5s cubic-bezier(0.4,0,0.2,1);
    overflow:hidden;
  }
  #product-panel.open { right:0; }
  #pp-header {
    display:flex; align-items:center; gap:8px;
    padding:14px 18px;
    border-bottom:1px solid rgba(0,180,255,0.2);
    background:rgba(0,40,100,0.3);
    flex-shrink:0;
  }
  #pp-title {
    font-family:'Orbitron',sans-serif; font-size:11px;
    letter-spacing:3px; color:rgba(0,200,255,0.85); flex:1;
  }
  #pp-count {
    font-family:'Rajdhani',sans-serif; font-size:12px;
    color:rgba(0,200,255,0.5);
  }
  #pp-close {
    width:28px; height:28px; border-radius:50%;
    background:rgba(0,180,255,0.15); border:1px solid rgba(0,180,255,0.3);
    color:#00d4ff; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #pp-close:hover { background:rgba(0,180,255,0.35); transform:scale(1.1); }
  #pp-grid-wrap {
    flex:1; overflow-y:auto; padding:14px;
    scrollbar-width:thin; scrollbar-color:rgba(0,180,255,0.3) transparent;
  }
  #pp-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:10px;
  }
  .pp-card {
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(0,180,255,0.2);
    border-radius:12px; padding:10px;
    text-decoration:none; display:block;
    transition:all 0.2s;
    animation:fadeIn 0.3s ease;
  }
  .pp-card:hover { border-color:rgba(0,200,255,0.6); transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,160,255,0.2); }
  .pp-card img { width:100%; height:90px; object-fit:contain; border-radius:8px; margin-bottom:6px; }
  .pp-card .pp-name { font-size:11px; color:#fff; font-weight:600; line-height:1.3; margin-bottom:4px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .pp-card .pp-orig { font-size:10px; color:rgba(255,255,255,0.4); text-decoration:line-through; }
  .pp-card .pp-price { font-size:14px; color:#7dd3fc; font-weight:700; }
  .pp-card .pp-store { font-size:9px; color:rgba(255,255,255,0.35); margin-top:2px; }
  #pp-loader {
    text-align:center; padding:16px;
    color:rgba(0,200,255,0.5); font-size:13px;
  }
  #chat-holo-frame {
    background:rgba(0,20,60,0.55);
    border:1.5px solid rgba(0,180,255,0.5);
    border-radius:18px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(0,160,255,0.3), 0 0 60px rgba(0,120,255,0.1), inset 0 0 20px rgba(0,160,255,0.05);
    display:flex; flex-direction:column;
    overflow:hidden;
    animation:holoGlow 3s ease-in-out infinite;
  }
  @keyframes holoGlow {
    0%,100% { box-shadow:0 0 30px rgba(0,160,255,0.3), 0 0 60px rgba(0,120,255,0.1); border-color:rgba(0,180,255,0.5); }
    50% { box-shadow:0 0 40px rgba(0,180,255,0.5), 0 0 80px rgba(0,140,255,0.2); border-color:rgba(0,200,255,0.7); }
  }
  #chat-header {
    display:flex; align-items:center; gap:8px;
    padding:10px 16px;
    border-bottom:1px solid rgba(0,180,255,0.25);
    background:rgba(0,40,100,0.3);
  }
  #chat-header-dot {
    width:8px; height:8px; border-radius:50%;
    background:#00d4ff;
    box-shadow:0 0 8px #00d4ff;
    animation:dotBlink 2s ease-in-out infinite;
  }
  @keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #chat-header-title {
    font-family:'Orbitron',sans-serif;
    font-size:11px; letter-spacing:3px;
    color:rgba(0,200,255,0.85);
  }
  #chat-header-status {
    font-family:'Rajdhani',sans-serif;
    font-size:11px;
    color:rgba(0,200,255,0.45);
    margin-left:auto;
  }
  #chat-minimize {
    width:24px;height:24px;border-radius:50%;
    background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.3);
    color:rgba(0,200,255,0.7);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;margin-left:6px;flex-shrink:0;
  }
  #chat-minimize:hover { background:rgba(0,180,255,0.25);color:#00d4ff; }
  #chat-section.minimized #chat-holo-frame { display:none; }
  #chat-section.minimized #chat-holo-beam { display:none; }
  #chat-tray {
    display:none;position:fixed;bottom:20px;right:20px;z-index:45;
    width:52px;height:52px;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle,rgba(0,40,120,0.7),rgba(0,20,60,0.9));
    border:1.5px solid rgba(0,180,255,0.6);
    box-shadow:0 0 20px rgba(0,160,255,0.4),0 0 40px rgba(0,120,255,0.15);
    align-items:center;justify-content:center;
    animation:trayPulse 2s ease-in-out infinite;
    transition:transform 0.2s;
  }
  #chat-tray:hover { transform:scale(1.1); }
  #chat-tray.visible { display:flex; }
  @keyframes trayPulse {
    0%,100% { box-shadow:0 0 20px rgba(0,160,255,0.4); }
    50% { box-shadow:0 0 30px rgba(0,180,255,0.6),0 0 50px rgba(0,140,255,0.2); }
  }
  #chat-body {
    padding:12px 16px;
    flex:1;
  }
  #chat-footer {
    padding:10px 14px;
    border-top:1px solid rgba(0,180,255,0.15);
    background:rgba(0,30,80,0.2);
  }
  #chat-holo-beam {
    position:absolute; bottom:-40px; left:50%; transform:translateX(-50%);
    width:50%; height:40px;
    background:linear-gradient(to bottom, rgba(0,180,255,0.35), rgba(0,120,255,0.08), transparent);
    clip-path:polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
    pointer-events:none;
    animation:beamPulse 2.2s ease-in-out infinite;
  }
  .message { margin-bottom:8px; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .message.user { text-align:right; }
  .message.user span {
    display:inline-block; background:rgba(0,0,0,.75);
    border:1px solid rgba(0,180,255,0.4); color:#7dd3fc;
    padding:8px 14px; border-radius:16px 16px 4px 16px;
    font-size:14px; max-width:80%; backdrop-filter:blur(12px);
  }
  .message.ai span {
    display:inline-block; background:rgba(0,0,0,.75);
    border:1px solid rgba(0,180,255,.25); color:#ddd;
    padding:8px 14px; border-radius:16px 16px 16px 4px;
    font-size:14px; max-width:85%; backdrop-filter:blur(12px);
  }
  .message.ai .name {
    font-family:'Orbitron',sans-serif; font-size:9px;
    color:#00b4ff; letter-spacing:2px; margin-bottom:3px; opacity:.8;
  }
  #user-input {
    flex:1; background:rgba(0,0,0,.75);
    border:1px solid rgba(0,180,255,0.35); border-radius:12px;
    padding:13px 20px; color:#fff;
    font-family:'Rajdhani',sans-serif; font-size:15px; outline:none;
    backdrop-filter:blur(14px); transition:border-color .3s,box-shadow .3s;
  }
  #user-input:focus { border-color:rgba(0,200,255,0.7); box-shadow:0 0 20px rgba(0,180,255,.25); }
  #user-input::placeholder { color:rgba(255,255,255,.25); }
  #send-btn {
    width:44px; height:44px; border-radius:50%;
    background:radial-gradient(circle,rgba(0,180,255,0.8),rgba(0,120,200,0.9));
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 20px rgba(0,160,255,.45); transition:transform .2s,box-shadow .2s; flex-shrink:0;
  }
  #send-btn:hover { transform:scale(1.1); box-shadow:0 0 30px rgba(0,180,255,.65); }
  #send-btn svg { width:18px; height:18px; fill:#fff; }
  .dot-pulse span {
    display:inline-block; width:5px; height:5px; border-radius:50%;
    background:#00b4ff; margin:0 2px; animation:dotPulse 1.2s ease-in-out infinite;
  }
  .dot-pulse span:nth-child(2){animation-delay:.2s}
  .dot-pulse span:nth-child(3){animation-delay:.4s}
  @keyframes dotPulse { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
  #input-row { display:flex; gap:8px; align-items:center; }
  #img-btn:hover { background:rgba(0,180,255,0.3); border-color:rgba(0,200,255,0.6); transform:scale(1.08); }
  .jogi-link {
    display:flex; align-items:center;
    padding:14px 16px; border-radius:12px;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(212,160,23,0.25);
    color:#ddd; text-decoration:none;
    font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600;
    transition:all 0.2s;
  }
  .jogi-link:hover {
    background:rgba(212,160,23,0.12);
    border-color:rgba(212,160,23,0.5);
    color:#f0d060;
  }
  .lang-opt {
    padding:8px 12px; cursor:pointer; font-size:14px; color:#ddd;
    border-radius:8px; transition:all 0.2s; white-space:nowrap;
    font-family:'Rajdhani',sans-serif;
  }
  .lang-opt:hover { background:rgba(0,180,255,0.2); color:#7dd3fc; }
  .lang-opt.active { color:#00d4ff; font-weight:700; }

  /* === MOBILE === */
  @media (max-width: 768px) {
    .holo-orb {
      width:24px; height:24px; font-size:11px;
    }
    .holo-orb svg { width:12px; height:12px; }
    .holo-orb::before { inset:-3px; border-width:1px; }
    .holo-orb::after { inset:-6px; border-width:1px; }
    .holo-beam { width:1.5px; height:8%; }
    .bp { width:2px; height:2px; }

    /* Chat: fixed bottom, very compact */
    #chat-section {
      position:fixed !important;
      left:4% !important; right:4% !important;
      bottom:8px !important;
      top:auto !important;
      width:92% !important; max-width:none !important; min-width:0 !important;
      transform:none !important;
      z-index:42;
    }
    #chat-section.shifted {
      left:4% !important; right:4% !important;
      width:92% !important; max-width:none !important; min-width:0 !important;
      transform:none !important;
    }
    #chat-holo-beam { display:none; }
    #chat-messages { max-height:15vh !important; }
    #chat-holo-frame { border-radius:12px; }
    #chat-header { padding:5px 10px; gap:5px; }
    #chat-header-dot { width:5px; height:5px; }
    #chat-header-title { font-size:9px; letter-spacing:1.5px; }
    #chat-header-status { font-size:9px; }
    #chat-minimize { width:18px; height:18px; font-size:10px; margin-left:4px; }
    #chat-body { padding:4px 8px; }
    #chat-footer { padding:5px 8px; }
    #user-input { padding:7px 10px; font-size:12px; border-radius:8px; }
    #send-btn { width:28px; height:28px; }
    #send-btn svg { width:12px; height:12px; }
    #img-btn { width:24px !important; height:24px !important; }
    #img-btn svg { width:11px !important; height:11px !important; }
    #input-row { gap:5px; }
    .message { margin-bottom:3px; }
    .message.user span, .message.ai span { font-size:11px; padding:4px 8px; }
    .message.ai .name { font-size:7px; letter-spacing:1px; margin-bottom:1px; }

    #chat-tray { width:36px; height:36px; bottom:10px; right:10px; }
    #chat-tray svg { width:16px; height:16px; }

    #product-panel {
      width:100vw !important; max-width:none !important;
      right:-105vw; top:0; height:100vh;
      border-radius:0;
    }
    #product-panel.open { right:0; }
    #pp-grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
    #pp-grid-wrap { padding:10px; }
    .pp-card { padding:8px; border-radius:10px; }
    .pp-card img { height:75px; border-radius:6px; margin-bottom:4px; }
    .pp-card .pp-name { font-size:10px; }

const VIDEO_W = 1280, VIDEO_H = 720;
const container = document.getElementById('video-container');
const bgVideo = document.getElementById('bg-video');

function resizeVideo() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const videoAspect = VIDEO_W / VIDEO_H;
  const screenAspect = vw / vh;
  if (screenAspect > videoAspect) {
    container.style.height = vh + 'px';
    container.style.width = (vh * videoAspect) + 'px';
    container.style.marginLeft = ((vw - vh * videoAspect) / 2) + 'px';
    container.style.marginTop = '0px';
  } else {
    container.style.width = vw + 'px';
    container.style.height = (vw / videoAspect) + 'px';
    container.style.marginTop = ((vh - vw / videoAspect) / 2) + 'px';
    container.style.marginLeft = '0px';
  }
}
window.addEventListener('resize', resizeVideo);
resizeVideo();

}

// Pénznem szimbólumok
const currSymbol = { HUF:'Ft', RON:'lei', EUR:'€', UAH:'₴', USD:'$' };
function fmtPrice(val, cur) {
  if (!val || val === '0' || val === '0.00') return '';
  const n = Math.round(parseFloat(val)).toLocaleString('hu');
  const sym = currSymbol[cur] || cur;
  return (cur === 'EUR' || cur === 'USD' || cur === 'UAH') ? sym + ' ' + n : n + ' ' + sym;
}

function getFavorites() {
  try { return JSON.parse(localStorage.getItem('inaya_favs') || '[]'); } catch(e) { return []; }
}
function saveFavorites(favs) { localStorage.setItem('inaya_favs', JSON.stringify(favs)); }
function isFav(id) { return getFavorites().some(f => f.id === id); }
function toggleFav(id, name, image_url, sale_price, currency, affiliate_url, store, btn) {
  let favs = getFavorites();
  const idx = favs.findIndex(f => f.id === id);
  if (idx >= 0) {
    favs.splice(idx, 1);
    btn.textContent = '☆';
    btn.style.color = 'rgba(255,255,255,0.4)';
  } else {
    favs.push({ id, name, image_url, sale_price, currency, affiliate_url, store, added: Date.now() });
    btn.textContent = '★';
    btn.style.color = '#f0d060';
  }
  saveFavorites(favs);
}

function favBtnHtml(item) {
  const id = item.id || item.name || '';
  const fav = isFav(id);
  const data = [id, item.name||'', item.image_url||'', item.sale_price||item.min_price||'', item.currency||'HUF', item.affiliate_url||'', item.store||item.best_store||''].map(s => String(s).replace(/'/g, "\\'"));
  return '<div onclick="event.preventDefault();event.stopPropagation();toggleFav(\'' + data.join("','") + '\',this)" style="position:absolute;top:6px;left:6px;font-size:18px;cursor:pointer;line-height:1;z-index:2;text-shadow:0 0 4px rgba(0,0,0,0.8);color:' + (fav ? '#f0d060' : 'rgba(255,255,255,0.4)') + '">' + (fav ? '★' : '☆') + '</div>';
}

  h += '</' + (hasLink ? 'a' : 'div') + '>';
  return h;
}

// Fordítás angolra az AliExpress kereséshez
async function translateToEnglish(text) {
  if (!text || text.length < 2) return text;
  try {
    const res = await fetch(API + '/translate/?q=' + encodeURIComponent(text));
    const data = await res.json();
    return data.translated || text;
  } catch(e) { return text; }
}

async function modalFetchItems(query, page) {
  const aeLang = langToAE[currentLang] || 'EN';
  const aeCur = langToCurrency[currentLang] || 'EUR';
  const isKuponok = currentModalType === 'kuponok';
  const limit = 20;
  let items = [];

  let searchQuery = query.length > 0 ? query : (modalDefaultKw || (modalDefaultKw = hotKeywords[Math.floor(Math.random() * hotKeywords.length)]));

  // Fordítás angolra AliExpress-hez (csak user query-nél, nem random keyword-öknél)
  let aeQuery = searchQuery;
  if (query.length > 0 && page === 1) {
    aeQuery = await translateToEnglish(query);
  }

  // Meilisearch csak első oldalon, nem kupon/akció módban, és van query
  if (query.length > 0 && page === 1 && !isKuponok && currentModalType !== 'akciok') {
    try {
      const res = await fetch(API + '/search/?q=' + encodeURIComponent(query) + '&limit=12');
      const data = await res.json();
      items = (data.hits || data.items || []).map(i => ({...i, store: i.best_store || 'Inaya'}));
    } catch(e) {}
  }

  // AliExpress keresés (angolra fordított query-vel)
  try {
    const aeRes = await fetch(API + '/aliexpress/search?q=' + encodeURIComponent(query.length > 0 ? aeQuery : searchQuery) + '&limit=' + limit + '&page=' + page + '&lang=' + aeLang + '&currency=' + aeCur + '&sort=LAST_VOLUME_DESC');
    const aeData = await aeRes.json();
    if (aeData.items && aeData.items.length > 0) {
      let aeItems = aeData.items;
      if (isKuponok) {
        aeItems = aeItems.filter(i => i.discount && i.discount !== '0%');
        aeItems.sort((a,b) => parseInt(b.discount||'0') - parseInt(a.discount||'0'));
      }
      items = items.concat(aeItems);
    }
    // Ha kevesebb mint limit jött, nincs több
    if (!aeData.items || aeData.items.length < limit) modalHasMore = false;
  } catch(aeErr) {
    console.warn('AliExpress search error:', aeErr);
    modalHasMore = false;
  }

  return items;
}

async function modalSearch(query, reset) {
  const resultsEl = document.getElementById('modal-results');
  if (!resultsEl) return;
  modalLoading = true;

  if (reset) {
    modalPage = 1;
    modalHasMore = true;
    modalDefaultKw = null;
    modalLastQuery = query;
    resultsEl.innerHTML = '<div class="loading" style="color:#d4a017;text-align:center;padding:20px"><div class="dot-pulse"><span></span><span></span><span></span></div></div>';
  }

  try {
    const items = await modalFetchItems(query, modalPage);

    if (reset && items.length === 0) {
      resultsEl.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:30px">' + t('noResults') + '</div>';
      modalLoading = false;
      return;
    }

    // Grid elem keresése vagy létrehozása
    let grid = resultsEl.querySelector('.modal-grid');
    if (reset || !grid) {
      resultsEl.innerHTML = '<div class="modal-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px"></div>';
      grid = resultsEl.querySelector('.modal-grid');
    }

    // Kártyák hozzáadása
    items.forEach(item => { grid.insertAdjacentHTML('beforeend', buildModalCard(item)); });

    // Load more indikátor
    const loadMoreEl = document.getElementById('modal-load-more');
    if (loadMoreEl) loadMoreEl.style.display = modalHasMore ? 'none' : 'none';

  } catch(e) {
    if (reset) resultsEl.innerHTML = '<div style="text-align:center;color:#ff6b6b;padding:20px">Hiba a betöltésnél</div>';
  }
  modalLoading = false;
}

async function modalLoadMore() {
  if (!modalHasMore || modalLoading) return;
  modalPage++;
  const loadMoreEl = document.getElementById('modal-load-more');
  if (loadMoreEl) loadMoreEl.style.display = 'block';
  await modalSearch(modalLastQuery || '', false);
  if (loadMoreEl) loadMoreEl.style.display = 'none';
}

function copyCoupon(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Másolva!';
    btn.style.background = 'rgba(34,197,94,0.3)';
    btn.style.borderColor = 'rgba(34,197,94,0.6)';
    btn.style.color = '#22c55e';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = 'rgba(212,160,23,0.2)';
      btn.style.borderColor = 'rgba(212,160,23,0.5)';
      btn.style.color = '#d4a017';
    }, 1500);
  });
}

  const msgEl = document.getElementById('partner-msg');
  const btn = form.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.textContent = 'KÜLDÉS...';

  const data = {

    contact_name: form.contact_name.value,
    email: form.email.value,
    website: form.website.value || '',
    category: form.category.value || '',
    has_api: form.has_api.checked,
    description: form.description.value || '',
  };

  try {
    const res = await fetch(API + '/partner/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const result = await res.json();
    if (res.ok && result.success) {
      msgEl.style.display = 'block';
      msgEl.style.background = 'rgba(34,197,94,0.15)';
      msgEl.style.border = '1px solid rgba(34,197,94,0.3)';

  } catch(err) {

function t(key) {
  return i18n[currentLang]?.[key] || i18n['hu'][key] || key;

function formatPrice(amount) {
  if (!amount) return '';
  const lang = i18n[currentLang] || i18n['hu'];
  const val = Math.round(amount).toLocaleString(currentLang === 'hu' ? 'hu' : currentLang);
  return lang.currencyPos === 'before'
    ? lang.currencySymbol + ' ' + val
    : val + ' ' + lang.currencySymbol;
}

function buildCard(item) {
  const cur = item.currency || 'HUF';
  const priceStr = fmtPrice(item.sale_price || item.min_price, cur);
  const origStr = fmtPrice(item.original_price, cur);
  const showOrig = origStr && item.original_price != item.sale_price;
  const link = item.affiliate_url || '#';
  const store = item.store || item.best_store || '';
  const disc = item.discount && item.discount !== '0%' ? item.discount : '';
  const ship = item.ship_days ? '🚚 ~' + item.ship_days + ' nap' : '';
  const tag = link !== '#' ? 'a' : 'div';
  let h = '<' + tag + (link !== '#' ? ' href="'+link+'" target="_blank" rel="noopener"' : '') + ' class="pp-card" style="position:relative">';
  h += favBtnHtml(item);
  if (disc) h += '<div style="position:absolute;top:6px;right:6px;background:rgba(255,60,60,0.85);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px">-' + disc + '</div>';
  if (item.image_url) h += '<img src="'+item.image_url+'" onerror="this.style.display=\'none\'" loading="lazy" />';
  h += '<div class="pp-name">' + (item.name || '') + '</div>';
  if (showOrig) h += '<div class="pp-orig">' + origStr + '</div>';
  if (priceStr) h += '<div class="pp-price">' + priceStr + '</div>';
  if (ship) h += '<div style="font-size:10px;color:rgba(0,200,255,0.55);margin-top:2px">' + ship + '</div>';
  if (store) h += '<div class="pp-store">' + store + '</div>';
  h += '</' + tag + '>';
  return h;
}

      '&limit=' + PP_PER_PAGE + '&page=' + ppPage +
      '&lang=' + aeLang + '&currency=' + aeCur + '&sort=LAST_VOLUME_DESC';
    const res = await fetch(url);
    const data = await res.json();
    const items = data.items || [];

    if (items.length === 0) {
      ppDone = true;
      ppLoader.style.display = 'none';
    } else {
      let html = '';
      items.forEach(item => { html += buildCard(item); });
      ppGrid.insertAdjacentHTML('beforeend', html);
      ppPage++;
      ppLoader.style.display = 'none';
      if (items.length < PP_PER_PAGE) ppDone = true;
    }

    // Update count
    const total = data.total || ppGrid.children.length;
    ppCount.textContent = ppGrid.children.length + ' / ' + total;
  } catch(e) {
    ppLoader.innerHTML = '<span style="color:#ff6b6b">Hiba</span>';
  }
  ppLoading = false;
}

async function openProductPanel(query) {
  // Fordítás angolra az AliExpress kereséshez
  ppQuery = await translateToEnglish(query);
  ppPage = 1;
  ppDone = false;
  ppGrid.innerHTML = '';
  ppCount.textContent = '';
  productPanel.classList.add('open');
  chatSection.classList.add('shifted');
  loadProductPage();
}

function closeProductPanel() {
  productPanel.classList.remove('open');
  chatSection.classList.remove('shifted');
  ppQuery = '';
}

// === CHAT MINIMIZE / RESTORE ===
const chatTray = document.getElementById('chat-tray');
function minimizeChat() {
  chatSection.classList.add('minimized');
  chatTray.classList.add('visible');
}
function restoreChat() {
  chatSection.classList.remove('minimized');
  chatTray.classList.remove('visible');
}

// Lazy loading – scroll figyelés
ppGridWrap.addEventListener('scroll', () => {
  if (ppDone || ppLoading) return;
  const { scrollTop, scrollHeight, clientHeight } = ppGridWrap;
  if (scrollTop + clientHeight >= scrollHeight - 100) {
    loadProductPage();
  }
});

async function sendMessage() {
  const text = input.value.trim();
  const hasImage = !!pendingImage;
  if (!text && !hasImage) return;

  input.value = '';

  // Show user message with optional image
  if (hasImage && text) {
    addMessage('<img src="'+pendingImage+'" style="max-height:80px;border-radius:8px;margin-bottom:4px;display:block" />' + text, 'user');
  } else if (hasImage) {
    addMessage('<img src="'+pendingImage+'" style="max-height:80px;border-radius:8px" />', 'user');
  } else {
    addMessage(text, 'user');
  }

  typingEl.style.display = 'block';
  try {
    const body = { session_id: sessionId, lang: currentLang };
    if (text) body.message = text;
    if (hasImage) body.image = pendingImage;

    const sentImage = pendingImage;
    removeImage();

    const res = await fetch('https://h104-64.rackhostvps.com/api/v1/assistant', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.session_id) sessionId = data.session_id;
    typingEl.style.display = 'none';
    addMessage(data.response || 'Hiba történt.', 'ai');

    // Ha vannak termékek, nyissuk meg a panelt
    if (data.products && data.products.length > 0) {
      // Keresési kifejezés kinyerése a szövegből
      const searchQuery = text || 'product';
      openProductPanel(searchQuery);
    }
  } catch(e) {
    typingEl.style.display = 'none';
    addMessage(t('errorMsg') + (e.message || e.toString()), 'ai');
  }
}

// Welcome message
addMessage(t('welcome'), 'ai');

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });


</script>
