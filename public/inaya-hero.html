<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inaya AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html { width:100%; height:100%; height:-webkit-fill-available; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; }
  body { width:100%; height:100%; min-height:-webkit-fill-available; min-height:100svh; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; }

  #video-wrap {
    position:absolute; inset:0; z-index:1;
    background:#000;
    background-image:url('/inaya-mobile-bg.png');
    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
  }
  #video-container { position:relative; width:100%; height:100%; }
  #bg-video { display:none; }

  .holo-unit { display:none !important; }
  .holo-unit.float { display:none !important; }
  .holo-orb { display:none !important; }

  .holo-beam { display:none; }
  .gold .holo-beam { display:none; }
  .bp { display:none; }

  #table-effect { display:none; }
  #fade { display:none; }

  /* === KOSÁR KATTINTHATÓ TERÜLET === */
  #cart-btn {
    position:fixed; z-index:21;
    left:50%; top:62%;
    transform:translate(-50%,-50%);
    width:14vh; height:14vh;
    border-radius:50%;
    background:transparent;
    border:none;
    cursor:pointer;
    padding:0;
  }
  /* Kis kör forgás a kosár körül */
  #cart-btn::before {
    content:'';
    position:absolute;
    inset:-12px;
    border-radius:50%;
    background: conic-gradient(
      from 90deg,
      transparent 0deg,
      rgba(212,160,23,0.7) 50deg,
      rgba(240,208,96,0.9) 80deg,
      transparent 130deg,
      transparent 200deg,
      rgba(212,160,23,0.5) 260deg,
      transparent 310deg,
      transparent 360deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 1.5px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 1.5px));
    animation:smallRingRotate 6s linear infinite;
    filter: drop-shadow(0 0 5px rgba(212,160,23,0.5));
    pointer-events:none;
  }
  @keyframes smallRingRotate {
    from { transform:rotate(0deg); }
    to { transform:rotate(360deg); }
  }
  /* === FORGÓ IKONOK === */
  #orbit-icons {
    position:fixed; z-index:20;
    left:50%; top:62%;
    transform:translate(-50%,-50%);
    width:26vh; height:26vh;
    border-radius:50%;
    animation:orbitSpin 20s linear infinite;
    pointer-events:none;
  }
  .orbit-icon {
    position:absolute;
    width:32px; height:32px;
    color:rgba(212,160,23,0.9);
    filter: drop-shadow(0 0 6px rgba(212,160,23,0.7)) drop-shadow(0 0 14px rgba(212,160,23,0.3));
    left:50%; top:50%;
    --angle: calc(var(--i) * 51.43deg);
    transform: rotate(var(--angle)) translateY(-13vh) rotate(calc(-1 * var(--angle)));
    margin-left:-16px; margin-top:-16px;
    pointer-events:auto;
    cursor:pointer;
    font-size:20px;
    display:flex; align-items:center; justify-content:center;
    transition: transform 0.2s, filter 0.2s;
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(212,160,23,0.4);
    border-radius:50%;
    padding:4px;
  }
  .orbit-icon:hover {
    filter: drop-shadow(0 0 10px rgba(212,160,23,1)) drop-shadow(0 0 20px rgba(212,160,23,0.5));
  }
  .orbit-icon svg {
    width:18px; height:18px;
    animation:orbitCounterSpin 20s linear infinite;
  }
  @keyframes orbitSpin {
    from { transform:translate(-50%,-50%) rotate(0deg); }
    to { transform:translate(-50%,-50%) rotate(360deg); }
  }
  @keyframes orbitCounterSpin {
    from { transform:rotate(0deg); }
    to { transform:rotate(-360deg); }
  }

  /* === KÜLSŐ ELLENTÉTES GYŰRŰ === */
  #cart-ring-outer {
    position:fixed; z-index:18;
    left:50%; top:62%;
    transform:translate(-50%,-50%);
    width:48vh; height:48vh;
    border-radius:50%;
    pointer-events:none;
  }
  #cart-ring-outer::before {
    content:'';
    position:absolute;
    inset:-4px;
    border-radius:50%;
    background: conic-gradient(
      from 120deg,
      transparent 0deg,
      rgba(212,160,23,0.5) 30deg,
      rgba(240,208,96,0.7) 60deg,
      transparent 100deg,
      transparent 160deg,
      rgba(255,215,0,0.4) 200deg,
      rgba(212,160,23,0.6) 240deg,
      transparent 280deg,
      transparent 360deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff calc(100% - 2px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff calc(100% - 2px));
    animation:ringRotate 12s linear infinite reverse;
    filter: drop-shadow(0 0 10px rgba(255,200,50,0.4)) drop-shadow(0 0 25px rgba(212,160,23,0.2));
  }
  #cart-ring-outer::after {
    content:'';
    position:absolute;
    inset:6px;
    border-radius:50%;
    background: conic-gradient(
      from 300deg,
      transparent 0deg,
      rgba(255,200,50,0.3) 40deg,
      rgba(212,160,23,0.5) 80deg,
      transparent 120deg,
      transparent 220deg,
      rgba(240,208,96,0.4) 270deg,
      transparent 320deg,
      transparent 360deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #fff calc(100% - 1px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #fff calc(100% - 1px));
    animation:ringRotateInner 16s linear infinite;
    filter: drop-shadow(0 0 6px rgba(255,215,0,0.3));
  }

  /* === FORGÓ GYŰRŰ === */
  #cart-ring {
    position:fixed; z-index:19;
    left:50%; top:62%;
    transform:translate(-50%,-50%);
    width:38vh; height:38vh;
    border-radius:50%;
    pointer-events:none;
  }
  #cart-ring img { display:none; }
  /* Külső gyűrű */
  #cart-ring::before {
    content:'';
    position:absolute;
    inset:-4px;
    border-radius:50%;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(212,160,23,0.8) 40deg,
      rgba(240,208,96,0.95) 80deg,
      transparent 120deg,
      transparent 180deg,
      rgba(212,160,23,0.5) 220deg,
      rgba(240,208,96,0.7) 260deg,
      transparent 300deg,
      transparent 360deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff calc(100% - 2px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff calc(100% - 2px));
    animation:ringRotate 10s linear infinite;
    filter: drop-shadow(0 0 10px rgba(212,160,23,0.5)) drop-shadow(0 0 25px rgba(212,160,23,0.2));
  }
  /* Belső gyűrű */
  #cart-ring::after {
    content:'';
    position:absolute;
    inset:8px;
    border-radius:50%;
    background: conic-gradient(
      from 180deg,
      transparent 0deg,
      rgba(212,160,23,0.6) 60deg,
      rgba(240,208,96,0.8) 90deg,
      transparent 150deg,
      transparent 200deg,
      rgba(212,160,23,0.4) 280deg,
      transparent 340deg,
      transparent 360deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #fff calc(100% - 1px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #fff calc(100% - 1px));
    animation:ringRotateInner 14s linear infinite reverse;
    filter: drop-shadow(0 0 6px rgba(212,160,23,0.4));
  }
  @keyframes ringRotate {
    from { transform:rotate(0deg); }
    to { transform:rotate(360deg); }
  }
  @keyframes ringRotateInner {
    from { transform:rotate(0deg); }
    to { transform:rotate(360deg); }
  }
  /* === VILLÁM EFFEKT === */
  #lightning-canvas {
    position:fixed; z-index:20;
    left:50%; top:62%;
    transform:translate(-50%,-50%);
    pointer-events:none;
  }

  @keyframes goldPulse {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(255,200,50,0.7)) drop-shadow(0 0 40px rgba(212,160,23,0.4)) drop-shadow(0 0 60px rgba(255,215,0,0.2)); }
    50% { filter: drop-shadow(0 0 25px rgba(255,215,0,0.9)) drop-shadow(0 0 55px rgba(255,200,50,0.5)) drop-shadow(0 0 80px rgba(212,160,23,0.3)); }
  }
  @keyframes goldPulseInner {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(255,215,0,0.5)) drop-shadow(0 0 25px rgba(212,160,23,0.3)); }
    50% { filter: drop-shadow(0 0 18px rgba(255,215,0,0.7)) drop-shadow(0 0 35px rgba(255,200,50,0.4)); }
  }

  /* Chat rejtve alapból */
  #chat-section { display:none; }
  #chat-section.visible { display:block; }

  /* === GOLD MODAL === */
  #modal-overlay {
    position:fixed; inset:0; z-index:50;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.5);
    animation:modalFadeIn 0.3s ease;
  }
  #modal-overlay.active { display:flex; }
  @keyframes modalFadeIn { from{opacity:0} to{opacity:1} }

  #modal-box {
    width:520px; max-width:90vw; max-height:90vh;
    background:transparent;
    border:1.5px solid rgba(212,160,23,0.6);
    border-radius:20px;
    backdrop-filter:blur(6px);
    box-shadow:0 0 40px rgba(212,160,23,0.35), 0 0 80px rgba(212,160,23,0.15), inset 0 0 30px rgba(212,160,23,0.08), inset 0 1px 0 rgba(255,220,100,0.2);
    padding:28px 24px;
    color:#fff;
    overflow-y:auto;
    animation:modalSlideIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes modalSlideIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

  #modal-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; padding-bottom:12px;
    border-bottom:1px solid rgba(212,160,23,0.25);
  }
  #modal-title {
    font-family:'Orbitron',sans-serif;
    font-size:14px; letter-spacing:3px;
    color:#d4a017;
  }
  #modal-icon { font-size:28px; margin-right:12px; }
  #modal-close {
    width:32px; height:32px; border-radius:50%;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.3);
    color:#d4a017; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #modal-close:hover { background:rgba(212,160,23,0.3); transform:scale(1.1); }
  #modal-body {
    font-family:'Rajdhani',sans-serif;
    font-size:15px; line-height:1.6;
    color:rgba(255,255,255,0.8);
  }
  #modal-body .loading {
    text-align:center; padding:30px;
    color:#d4a017;
  }

  /* === CHAT === */
  #chat-section {
    position:absolute; z-index:10;
    left:50%; top:78%;
    transform:translate(-50%,-50%);
    width:42%; max-width:400px; min-width:260px;
    transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  #chat-section.shifted {
    left:22%; width:34%; max-width:340px; min-width:220px;
  }

  /* === PRODUCT PANEL === */
  #product-panel {
    position:fixed; z-index:10000;
    top:5vh; right:0; width:50vw; max-width:600px; height:90vh;
    background:rgba(0,0,0,0.8);
    border:1.5px solid rgba(212,160,23,0.4);
    border-radius:20px 0 0 20px;
    backdrop-filter:blur(14px);
    box-shadow:0 0 40px rgba(212,160,23,0.15);
    display:none; flex-direction:column;
    overflow:hidden;
    pointer-events:auto;
  }
  #pp-header {
    display:flex; align-items:center; gap:8px;
    padding:14px 18px;
    border-bottom:1px solid rgba(212,160,23,0.2);
    background:rgba(0,0,0,0.4);
    flex-shrink:0;
  }
  #pp-title {
    font-family:'Orbitron',sans-serif; font-size:11px;
    letter-spacing:3px; color:rgba(212,160,23,0.85); flex:1;
  }
  #pp-count {
    font-family:'Rajdhani',sans-serif; font-size:12px;
    color:rgba(212,160,23,0.5);
  }
  #pp-close {
    width:28px; height:28px; border-radius:50%;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.3);
    color:#d4a017; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #pp-close:hover, #pp-minimize:hover { background:rgba(212,160,23,0.35); transform:scale(1.1); }
  #pp-minimize {
    width:28px; height:28px; border-radius:50%;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.3);
    color:#d4a017; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #product-panel.minimized {
    height:48px !important; min-height:48px;
    top:auto !important; bottom:10px !important;
    border-radius:20px 0 0 20px;
  }
  #product-panel.minimized #pp-grid-wrap { display:none; }
  #product-panel.minimized #pp-minimize { display:none; }
  #pp-grid-wrap {
    flex:1; overflow-y:auto; padding:14px;
    scrollbar-width:thin; scrollbar-color:rgba(212,160,23,0.3) transparent;
  }
  #pp-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:10px;
  }
  .pp-card {
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(212,160,23,0.25);
    border-radius:12px; padding:10px;
    text-decoration:none; display:block;
    transition:all 0.3s ease;
    animation:fadeIn 0.3s ease;
    position:relative;
    overflow:hidden;
  }
  .pp-card::before {
    content:'';
    position:absolute;
    top:-50%;left:-50%;
    width:200%;height:200%;
    background:conic-gradient(from 0deg, transparent 0%, rgba(212,160,23,0.15) 25%, transparent 50%, rgba(212,160,23,0.1) 75%, transparent 100%);
    animation:goldRotate 6s linear infinite;
    opacity:0;
    transition:opacity 0.3s;
    z-index:0;
  }
  .pp-card:hover::before { opacity:1; }
  .pp-card::after {
    content:'';
    position:absolute;
    inset:1px;
    background:rgba(0,0,0,0.4);
    border-radius:11px;
    z-index:0;
  }
  .pp-card > * { position:relative; z-index:1; }
  .pp-card:hover { border-color:rgba(212,160,23,0.7); transform:translateY(-3px); box-shadow:0 6px 24px rgba(212,160,23,0.2), 0 0 12px rgba(212,160,23,0.1); }
  @keyframes goldRotate { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  .pp-card img { width:100%; height:90px; object-fit:contain; border-radius:8px; margin-bottom:6px; }
  .pp-card .pp-name { font-size:11px; color:#fff; font-weight:600; line-height:1.3; margin-bottom:4px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .pp-card .pp-orig { font-size:10px; color:rgba(255,255,255,0.4); text-decoration:line-through; }
  .pp-card .pp-price { font-size:14px; color:#f0d060; font-weight:700; }
  .pp-card .pp-store { font-size:9px; color:rgba(255,255,255,0.35); margin-top:2px; }
  #pp-loader {
    text-align:center; padding:16px;
    color:rgba(212,160,23,0.5); font-size:13px;
  }
  #chat-holo-frame {
    background:rgba(0,0,0,0.75);
    border:1.5px solid rgba(212,160,23,0.5);
    border-radius:18px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(212,160,23,0.2), 0 0 60px rgba(212,160,23,0.08);
    display:flex; flex-direction:column;
    overflow:hidden;
    animation:goldGlow 3s ease-in-out infinite;
  }
  @keyframes goldGlow {
    0%,100% { box-shadow:0 0 30px rgba(212,160,23,0.2), 0 0 60px rgba(212,160,23,0.08); border-color:rgba(212,160,23,0.5); }
    50% { box-shadow:0 0 40px rgba(212,160,23,0.35), 0 0 80px rgba(212,160,23,0.15); border-color:rgba(212,160,23,0.7); }
  }
  #chat-header {
    display:flex; align-items:center; gap:8px;
    padding:10px 16px;
    border-bottom:1px solid rgba(212,160,23,0.25);
    background:rgba(0,0,0,0.4);
  }
  #chat-header-dot {
    width:8px; height:8px; border-radius:50%;
    background:#d4a017;
    box-shadow:0 0 8px #d4a017;
    animation:dotBlink 2s ease-in-out infinite;
  }
  @keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #chat-header-title {
    font-family:'Orbitron',sans-serif;
    font-size:11px; letter-spacing:3px;
    color:rgba(212,160,23,0.85);
  }
  #chat-header-status {
    font-family:'Rajdhani',sans-serif;
    font-size:11px;
    color:rgba(212,160,23,0.45);
    margin-left:auto;
  }
  #chat-minimize {
    width:24px;height:24px;border-radius:50%;
    background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);
    color:rgba(212,160,23,0.7);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;margin-left:6px;flex-shrink:0;
  }
  #chat-minimize:hover { background:rgba(212,160,23,0.25);color:#d4a017; }
  #chat-section.minimized #chat-holo-frame { display:none; }
  #chat-section.minimized #chat-holo-beam { display:none; }
  #chat-tray {
    display:none;position:fixed;bottom:20px;right:20px;z-index:45;
    width:52px;height:52px;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle,rgba(30,20,0,0.8),rgba(0,0,0,0.9));
    border:1.5px solid rgba(212,160,23,0.6);
    box-shadow:0 0 20px rgba(212,160,23,0.3),0 0 40px rgba(212,160,23,0.1);
    align-items:center;justify-content:center;
    animation:trayPulse 2s ease-in-out infinite;
    transition:transform 0.2s;
  }
  #chat-tray:hover { transform:scale(1.1); }
  #chat-tray.visible { display:flex; }
  @keyframes trayPulse {
    0%,100% { box-shadow:0 0 20px rgba(212,160,23,0.3); }
    50% { box-shadow:0 0 30px rgba(212,160,23,0.5),0 0 50px rgba(212,160,23,0.15); }
  }
  #chat-body {
    padding:12px 16px;
    flex:1;
  }
  #chat-footer {
    padding:10px 14px;
    border-top:1px solid rgba(212,160,23,0.15);
    background:rgba(0,0,0,0.3);
  }
  #chat-holo-beam { display:none; }
  .message { margin-bottom:8px; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .message.user { text-align:right; }
  .message.user span {
    display:inline-block; background:rgba(212,160,23,0.2);
    border:1px solid rgba(212,160,23,0.4); color:#f0d060;
    padding:8px 14px; border-radius:16px 16px 4px 16px;
    font-size:14px; max-width:80%; backdrop-filter:blur(12px);
  }
  .message.ai span {
    display:inline-block; background:rgba(0,0,0,.75);
    border:1px solid rgba(212,160,23,0.25); color:#ddd;
    padding:8px 14px; border-radius:16px 16px 16px 4px;
    font-size:14px; max-width:85%; backdrop-filter:blur(12px);
  }
  .message.ai .name {
    font-family:'Orbitron',sans-serif; font-size:9px;
    color:#d4a017; letter-spacing:2px; margin-bottom:3px; opacity:.8;
  }
  #user-input {
    flex:1; background:rgba(0,0,0,.75);
    border:1px solid rgba(212,160,23,0.35); border-radius:12px;
    padding:13px 20px; color:#fff;
    font-family:'Rajdhani',sans-serif; font-size:15px; outline:none;
    backdrop-filter:blur(14px); transition:border-color .3s,box-shadow .3s;
  }
  #user-input:focus { border-color:rgba(212,160,23,0.7); box-shadow:0 0 20px rgba(212,160,23,.25); }
  #user-input::placeholder { color:rgba(255,255,255,.25); }
  #send-btn {
    width:44px; height:44px; border-radius:50%;
    background:radial-gradient(circle,#d4a017,#b8860b);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 20px rgba(212,160,23,.45); transition:transform .2s,box-shadow .2s; flex-shrink:0;
  }
  #send-btn:hover { transform:scale(1.1); box-shadow:0 0 30px rgba(212,160,23,.65); }
  #send-btn svg { width:18px; height:18px; fill:#000; }
  .dot-pulse span {
    display:inline-block; width:5px; height:5px; border-radius:50%;
    background:#d4a017; margin:0 2px; animation:dotPulse 1.2s ease-in-out infinite;
  }
  .dot-pulse span:nth-child(2){animation-delay:.2s}
  .dot-pulse span:nth-child(3){animation-delay:.4s}

const VIDEO_W = 1280, VIDEO_H = 720;
const container = document.getElementById('video-container');
const bgVideo = document.getElementById('bg-video');

function resizeVideo() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const videoAspect = VIDEO_W / VIDEO_H;
  const screenAspect = vw / vh;
  if (screenAspect > videoAspect) {
    container.style.height = vh + 'px';
    container.style.width = (vh * videoAspect) + 'px';
    container.style.marginLeft = ((vw - vh * videoAspect) / 2) + 'px';
    container.style.marginTop = '0px';
  } else {
    container.style.width = vw + 'px';
    container.style.height = (vw / videoAspect) + 'px';
    container.style.marginTop = ((vh - vw / videoAspect) / 2) + 'px';
    container.style.marginLeft = '0px';
  }
}
window.addEventListener('resize', resizeVideo);
resizeVideo();

const basePos = {
  u1:{x:10.66,y:50.40}, u2:{x:17.82,y:52.65}, u3:{x:19.05,y:39.42},
  u4:{x:71.73,y:39.15}, u5:{x:83.13,y:51.32}, u6:{x:91.22,y:49.87},
  u7:{x:28.50,y:40.50},
};
const MOVE = {
  u1:{dx:-3.4,dy:0.3}, u2:{dx:-2.5,dy:-0.6}, u3:{dx:-1.7,dy:0.3},
  u4:{dx:3.6,dy:0.3}, u5:{dx:2.3,dy:-0.8}, u6:{dx:1.7,dy:0.3},
  u7:{dx:-1.7,dy:0.3},
};

let activated = false;
window.addEventListener('load', () => { setTimeout(showIcons, 800); });

function showIcons() {
  if (activated) return;
  activated = true;
  ['u1','u2','u3','u4','u5','u6','u7'].forEach((id, i) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      el.style.animation = 'unitAppear 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards';
      setTimeout(() => { el.style.animation = ''; el.classList.add('float'); }, 700);
    }, i * 220);
  });
}

function trackTick() {
  const t = bgVideo.currentTime || 0;
  const dur = bgVideo.duration || 4.0;
  const progress = t <= dur/2 ? t/(dur/2) : 1 - (t-dur/2)/(dur/2);
  ['u1','u2','u3','u4','u5','u6','u7'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || !el.classList.contains('float')) return;
    const m = MOVE[id];
    el.style.left = (basePos[id].x + m.dx * progress) + '%';
    el.style.top  = (basePos[id].y + m.dy * progress) + '%';
  });
  requestAnimationFrame(trackTick);
}

// Nyelv → AliExpress target_language mapping
const langToAE = { hu:'HU', ro:'RO', en:'EN', de:'DE', uk:'EN' };
// Nyelv → pénznem mapping (HUF default)
const langToCurrency = { hu:'HUF', ro:'RON', en:'EUR', de:'EUR', uk:'UAH' };
// Pénznem szimbólumok
const currSymbol = { HUF:'Ft', RON:'lei', EUR:'€', UAH:'₴', USD:'$' };
function fmtPrice(val, cur) {
  if (!val || val === '0' || val === '0.00') return '';
  const n = Math.round(parseFloat(val)).toLocaleString('hu');
  const sym = currSymbol[cur] || cur;
  return (cur === 'EUR' || cur === 'USD' || cur === 'UAH') ? sym + ' ' + n : n + ' ' + sym;
}

// === KEDVENCEK (localStorage) ===
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('inaya_favs') || '[]'); } catch(e) { return []; }
}
function saveFavorites(favs) { localStorage.setItem('inaya_favs', JSON.stringify(favs)); }
function isFav(id) { return getFavorites().some(f => f.id === id); }
function toggleFav(id, name, image_url, sale_price, currency, affiliate_url, store, btn) {
  let favs = getFavorites();
  const idx = favs.findIndex(f => f.id === id);
  if (idx >= 0) {
    favs.splice(idx, 1);
    btn.textContent = '☆';
    btn.style.color = 'rgba(255,255,255,0.4)';
  } else {
    favs.push({ id, name, image_url, sale_price, currency, affiliate_url, store, added: Date.now() });
    btn.textContent = '★';
    btn.style.color = '#f0d060';
  }
  saveFavorites(favs);
}

function favBtnHtml(item) {
  const id = item.id || item.name || '';
  const fav = isFav(id);
  const data = [id, item.name||'', item.image_url||'', item.sale_price||item.min_price||'', item.currency||'HUF', item.affiliate_url||'', item.store||item.best_store||''].map(s => String(s).replace(/'/g, "\\'"));
  return '<div onclick="event.preventDefault();event.stopPropagation();toggleFav(\'' + data.join("','") + '\',this)" style="position:absolute;top:6px;left:6px;font-size:18px;cursor:pointer;line-height:1;z-index:2;text-shadow:0 0 4px rgba(0,0,0,0.8);color:' + (fav ? '#f0d060' : 'rgba(255,255,255,0.4)') + '">' + (fav ? '★' : '☆') + '</div>';
}

function buildModalCard(item) {
  const cur = item.currency || 'HUF';
  const priceStr = fmtPrice(item.sale_price || item.min_price, cur);
  const origStr = fmtPrice(item.original_price, cur);
  const showOrig = origStr && item.original_price != (item.sale_price || item.min_price);
  const store = item.store || item.best_store || '';
  const isExternal = !!item.affiliate_url;
  const link = item.affiliate_url || (item.id ? '/termek/' + item.id : '#');
  const hasLink = link && link !== '#';
  const disc = item.discount_pct > 0 ? item.discount_pct + '%' : (item.discount && item.discount !== '0%' ? item.discount : '');
  const ship = item.ship_days ? '🚚 ~' + item.ship_days + ' nap' : '';
  if (!isExternal && item.id) { window._ppCache = window._ppCache || {}; window._ppCache[item.id] = item; }
  const productIdArg = !isExternal && item.id ? ",'" + String(item.id).replace(/'/g, "\\'") + "'" : '';
  const clickHandler = hasLink ? ' onclick="event.preventDefault();navigateLink(\'' + link.replace(/'/g, "\\'") + '\'' + productIdArg + ')"' : '';
  let h = '<div' + clickHandler + ' style="background:rgba(0,0,0,0.35);border:1px solid rgba(212,160,23,0.2);border-radius:12px;padding:10px;cursor:pointer;transition:all 0.2s;display:block;text-decoration:none;position:relative" onmouseover="this.style.borderColor=\'rgba(212,160,23,0.6)\'" onmouseout="this.style.borderColor=\'rgba(212,160,23,0.2)\'">';
  h += favBtnHtml(item);
  if (disc) h += '<div style="position:absolute;top:6px;right:6px;background:rgba(255,60,60,0.85);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px">-' + disc + '</div>';
  if (item.image_url) h += '<img src="' + item.image_url + '" style="width:100%;height:80px;object-fit:contain;border-radius:8px;margin-bottom:6px" onerror="this.style.display=\'none\'" loading="lazy" />';
  h += '<div style="font-size:12px;color:#fff;font-weight:600;line-height:1.3;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">' + (item.name||'') + '</div>';
  if (showOrig) h += '<div style="font-size:10px;color:rgba(255,255,255,0.4);text-decoration:line-through">' + origStr + '</div>';
  if (priceStr) h += '<div style="font-size:13px;color:#f0d060;font-weight:700">' + priceStr + '</div>';
  // Értékelés és rendelések
  const rating = item.rating ? parseFloat(item.rating) : 0;
  const orders = item.orders || 0;
  if (rating > 0 || orders > 0) {
    h += '<div style="display:flex;align-items:center;gap:4px;margin-top:3px;font-size:10px">';
    if (rating > 0) {
      const pct = Math.round((rating > 5 ? rating / 20 : rating / 5) * 100);
      h += '<div style="position:relative;display:inline-block;color:rgba(255,255,255,0.2);letter-spacing:1px;font-size:11px">★★★★★<div style="position:absolute;top:0;left:0;overflow:hidden;width:'+pct+'%;color:#f0d060;white-space:nowrap">★★★★★</div></div>';
      h += '<span style="color:rgba(255,255,255,0.5)">' + (rating > 5 ? (rating/20).toFixed(1) : rating.toFixed(1)) + '</span>';
    }
    if (orders > 0) h += '<span style="color:rgba(255,255,255,0.35)">' + (orders > 999 ? (orders/1000).toFixed(1)+'k' : orders) + ' rendelés</span>';
    h += '</div>';
  }
  if (ship) h += '<div style="font-size:10px;color:rgba(0,200,255,0.6);margin-top:3px">' + ship + '</div>';
  if (store) h += '<div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px;display:flex;align-items:center">' + storeHtml(store) + '</div>';
  h += '</div>';
  return h;
}

// Fordítás angolra az AliExpress kereséshez
async function translateToEnglish(text) {
  if (!text || text.length < 2) return text;
  try {
    const res = await fetch(API + '/translate/?q=' + encodeURIComponent(text));
    const data = await res.json();
    return data.translated || text;
  } catch(e) { return text; }
}

async function modalFetchItems(query, page) {
  const aeLang = langToAE[currentLang] || 'EN';
  const aeCur = langToCurrency[currentLang] || 'EUR';
  const isKuponok = currentModalType === 'kuponok';
  const limit = 20;
  let items = [];

  let searchQuery = query.length > 0 ? query : (modalDefaultKw || (modalDefaultKw = hotKeywords[Math.floor(Math.random() * hotKeywords.length)]));

  // Fordítás angolra AliExpress-hez (csak user query-nél, nem random keyword-öknél)
  let aeQuery = searchQuery;
  if (query.length > 0 && page === 1) {
    aeQuery = await translateToEnglish(query);
  }

  // Meilisearch keresés (Answear, GeekBuying + DB termékek)
  if (!isKuponok && currentModalType !== 'akciok') {
    try {
      var meiliQ = query.length > 0 ? encodeURIComponent(query) : '*';
      var meiliOffset = (page - 1) * 20;
      const res = await fetch(API + '/search/?q=' + meiliQ + '&limit=20&offset=' + meiliOffset);
      const data = await res.json();
      items = (data.hits || data.items || []).map(i => ({...i, store: i.best_store || (i.stores && i.stores[0]) || ''}));
    } catch(e) {}
  }

  // AliExpress + eBay keresés a /deals/search endpointon
  const searchQ = encodeURIComponent(query.length > 0 ? aeQuery : searchQuery);
  try {
    const res = await fetch(API + '/deals/search?q=' + searchQ + '&limit=' + limit + '&page=' + page + '&lang=' + aeLang + '&currency=' + aeCur);
    if (res.ok) {
      const data = await res.json();
      let fetchedItems = data.items || [];
      if (isKuponok) {
        fetchedItems = fetchedItems.filter(i => i.discount && i.discount !== '0%');
        fetchedItems.sort((a,b) => parseInt(b.discount||'0') - parseInt(a.discount||'0'));
      }
      if (fetchedItems.length < limit) modalHasMore = false;
      items = items.concat(fetchedItems);
    } else {
      modalHasMore = false;
    }
  } catch(err) {
    console.warn('Search error:', err);
    modalHasMore = false;
  }

  return items;
}

async function modalSearch(query, reset) {
  const resultsEl = document.getElementById('modal-results');
  if (!resultsEl) return;
  modalLoading = true;

  if (reset) {
    modalPage = 1;
    modalHasMore = true;
    modalDefaultKw = null;
    modalLastQuery = query;
    resultsEl.innerHTML = '<div class="loading" style="color:#d4a017;text-align:center;padding:20px"><div class="dot-pulse"><span></span><span></span><span></span></div></div>';
  }

  try {
    const items = await modalFetchItems(query, modalPage);

    if (reset && items.length === 0) {
      resultsEl.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:30px">' + t('noResults') + '</div>';
      modalLoading = false;
      return;
    }

    // Grid elem keresése vagy létrehozása
    let grid = resultsEl.querySelector('.modal-grid');
    if (reset || !grid) {
      resultsEl.innerHTML = '<div class="modal-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px"></div>';
      grid = resultsEl.querySelector('.modal-grid');
    }

    // Kártyák hozzáadása
    items.forEach(item => { grid.insertAdjacentHTML('beforeend', buildModalCard(item)); });

    // Load more indikátor
    const loadMoreEl = document.getElementById('modal-load-more');
    if (loadMoreEl) loadMoreEl.style.display = modalHasMore ? 'none' : 'none';

  } catch(e) {
    if (reset) resultsEl.innerHTML = '<div style="text-align:center;color:#ff6b6b;padding:20px">Hiba a betöltésnél</div>';
  }
  modalLoading = false;
}

async function modalLoadMore() {
  if (!modalHasMore || modalLoading) return;
  modalPage++;
  const loadMoreEl = document.getElementById('modal-load-more');
  if (loadMoreEl) loadMoreEl.style.display = 'block';
  await modalSearch(modalLastQuery || '', false);
  if (loadMoreEl) loadMoreEl.style.display = 'none';
}

function copyCoupon(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Másolva!';
    btn.style.background = 'rgba(34,197,94,0.3)';
    btn.style.borderColor = 'rgba(34,197,94,0.6)';
    btn.style.color = '#22c55e';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = 'rgba(212,160,23,0.2)';
      btn.style.borderColor = 'rgba(212,160,23,0.5)';
      btn.style.color = '#d4a017';
    }, 1500);
  });
}

async function navigateLink(url, productId) {
  // If it's an internal /termek/ link, try to resolve affiliate URL from DB first
  if (productId && url.startsWith('/termek/')) {
    try {
      var res = await fetch(API + '/products/' + productId);
      if (res.ok) {
        var data = await res.json();
        var affUrl = (data.prices && data.prices[0] && data.prices[0].affiliate_url) || data.affiliate_url;
        if (affUrl) { url = affUrl; }
      }
    } catch(e) {}
  }
  // Cache product data for internal links (fallback if no affiliate URL found)
  if (productId && url.startsWith('/termek/')) {
    try {
      var item = (window._ppCache || {})[productId];
      if (item) localStorage.setItem('product_' + productId, JSON.stringify(item));
    } catch(e) {}
  }
  // Send to parent React app via postMessage
  try { window.parent.postMessage({ type: 'inaya-navigate', url: url }, '*'); } catch(e) {}
  // Also try direct navigation as fallback
  try { window.open(url, '_blank'); } catch(e) {
    try { window.top.location.href = url; } catch(e2) {
      window.location.href = url;
    }
  }
}

function storeLogoUrl(storeName) {
  var s = (storeName || '').toLowerCase();
  if (s.indexOf('answear') >= 0) return 'https://www.google.com/s2/favicons?domain=answear.hu&sz=32';
  if (s.indexOf('geekbuying') >= 0) return 'https://www.google.com/s2/favicons?domain=geekbuying.com&sz=32';
  if (s.indexOf('aliexpress') >= 0) return 'https://www.google.com/s2/favicons?domain=aliexpress.com&sz=32';
  if (s.indexOf('ebay') >= 0) return 'https://www.google.com/s2/favicons?domain=ebay.com&sz=32';
  return '';
}

function storeHtml(storeName) {
  var logo = storeLogoUrl(storeName);
  if (logo) return '<img src="'+logo+'" style="width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:3px" onerror="this.style.display=\'none\'" />' + storeName;
  return storeName;
}

function buildCard(item) {
  const cur = item.currency || 'HUF';
  const priceStr = fmtPrice(item.sale_price || item.min_price, cur);
  const origStr = fmtPrice(item.original_price, cur);
  const showOrig = origStr && item.original_price != (item.sale_price || item.min_price);
  const isExternal = !!item.affiliate_url;
  const link = item.affiliate_url || (item.id ? '/termek/' + item.id : '#');
  const store = item.store || item.best_store || '';
  const disc = item.discount_pct > 0 ? item.discount_pct + '%' : (item.discount && item.discount !== '0%' ? item.discount : '');
  const ship = item.ship_days ? '🚚 ~' + item.ship_days + ' nap' : '';
  // Cache product data for internal links
  if (!isExternal && item.id) { window._ppCache = window._ppCache || {}; window._ppCache[item.id] = item; }
  const productIdArg = !isExternal && item.id ? ",'" + String(item.id).replace(/'/g, "\\'") + "'" : '';
  let h = '<div onclick="event.preventDefault();navigateLink(\'' + link.replace(/'/g, "\\'") + '\'' + productIdArg + ')" class="pp-card" style="position:relative;cursor:pointer">';
  h += favBtnHtml(item);
  if (disc) h += '<div style="position:absolute;top:6px;right:6px;background:rgba(255,60,60,0.85);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px">-' + disc + '</div>';
  if (item.image_url) h += '<img src="'+item.image_url+'" onerror="this.style.display=\'none\'" loading="lazy" />';
  h += '<div class="pp-name">' + (item.name || '') + '</div>';
  if (showOrig) h += '<div class="pp-orig">' + origStr + '</div>';
  if (priceStr) h += '<div class="pp-price">' + priceStr + '</div>';
  // Értékelés és rendelések
  const rating = item.rating ? parseFloat(item.rating) : 0;
  const orders = item.orders || 0;
  if (rating > 0 || orders > 0) {
    h += '<div style="display:flex;align-items:center;gap:3px;margin-top:2px;font-size:9px;flex-wrap:wrap">';
    if (rating > 0) {
      const pct = Math.round((rating > 5 ? rating / 20 : rating / 5) * 100);
      h += '<div style="position:relative;display:inline-block;color:rgba(255,255,255,0.2);letter-spacing:0.5px;font-size:9px">★★★★★<div style="position:absolute;top:0;left:0;overflow:hidden;width:'+pct+'%;color:#f0d060;white-space:nowrap">★★★★★</div></div>';
    }
    if (orders > 0) h += '<span style="color:rgba(255,255,255,0.35)">' + (orders > 999 ? (orders/1000).toFixed(1)+'k' : orders) + '</span>';
    h += '</div>';
  }
  if (ship) h += '<div style="font-size:10px;color:rgba(0,200,255,0.55);margin-top:2px">' + ship + '</div>';
  if (store) h += '<div class="pp-store" style="display:flex;align-items:center">' + storeHtml(store) + '</div>';
  h += '</div>';
  return h;
}

async function loadProductPage() {
  if (ppLoading || ppDone || !ppQuery) return;
  ppLoading = true;
  ppLoader.style.display = 'block';
  ppLoader.innerHTML = '<div class="dot-pulse"><span></span><span></span><span></span></div>';

  try {
    const ppQ = encodeURIComponent(ppQuery);
    const ppOffset = (ppPage - 1) * PP_PER_PAGE;
    const aeLang = langToAE[currentLang] || 'EN';
    const aeCur = langToCurrency[currentLang] || 'EUR';

    // Parallel: Meilisearch (Answear/GeekBuying) + deals API (AliExpress/eBay)
    const [meiliRes, dealsRes] = await Promise.all([
      fetch(API + '/search/?q=' + ppQ + '&limit=' + PP_PER_PAGE + '&offset=' + ppOffset).then(r => r.json()).catch(() => ({})),
      fetch(API + '/deals/search?q=' + ppQ + '&limit=' + PP_PER_PAGE + '&page=' + ppPage + '&lang=' + aeLang + '&currency=' + aeCur).then(r => r.json()).catch(() => ({})),
    ]);

    // Meili termékek mapping
    var meiliItems = (meiliRes.hits || []).map(function(h) {
      return Object.assign({}, h, {
        name: h.name || h.title || '',
        sale_price: h.sale_price || h.min_price || h.price || 0,
        store: h.store || h.best_store || (h.stores && h.stores[0]) || '',
      });
    });
    // Deals (AliExpress/eBay) termékek
    var dealItems = dealsRes.items || [];

    // Merge: Meili first, then deals, deduplicate by name
    var seenNames = {};
    var items = [];
    meiliItems.concat(dealItems).forEach(function(item) {
      var key = (item.name || '').toLowerCase().trim().substring(0, 50);
      if (!seenNames[key]) { seenNames[key] = true; items.push(item); }
    });

    if (items.length === 0) {
      ppDone = true;
      ppLoader.style.display = 'none';
    } else {
      let html = '';
      items.forEach(item => { html += buildCard(item); });
      ppGrid.insertAdjacentHTML('beforeend', html);
      ppPage++;
      ppLoader.style.display = 'none';
      if (meiliItems.length < PP_PER_PAGE && dealItems.length < PP_PER_PAGE) ppDone = true;
    }

    // Update count
    const total = (meiliRes.total || 0) + (dealsRes.total || 0);
    ppCount.textContent = ppGrid.children.length + ' / ' + total;
  } catch(e) {
    ppLoader.innerHTML = '<span style="color:#ff6b6b">Hiba</span>';
  }
  ppLoading = false;
}

async function openProductPanel(query, chatProducts) {
  ppPage = 1;
  ppDone = false;
  ppGrid.innerHTML = '';
  ppCount.textContent = '';
  productPanel.style.setProperty('display', 'flex', 'important');
  if (window.innerWidth <= 768) ppBackdrop.style.display = 'block';
  chatSection.classList.add('shifted');

  // Meilisearch keresés (Answear/GeekBuying) + chat termékek összekeverése
  var allItems = [];
  var seenNames = {};

  // 1. Meilisearch-ből gyorsan betöltjük az Answear/GeekBuying termékeket
  try {
    var meiliQ = encodeURIComponent(query || '*');
    var meiliRes = await fetch(API + '/search/?q=' + meiliQ + '&limit=20').then(r => r.json());
    (meiliRes.hits || []).forEach(function(h) {
      var key = (h.name || '').toLowerCase().trim().substring(0, 50);
      if (!seenNames[key]) {
        seenNames[key] = true;
        allItems.push(Object.assign({}, h, {
          sale_price: h.min_price || 0,
          store: h.best_store || (h.stores && h.stores[0]) || '',
        }));
      }
    });
  } catch(e) {}

  // 2. Chat API termékek hozzáadása (AliExpress/eBay)
  if (chatProducts && chatProducts.length > 0) {
    chatProducts.forEach(function(item) {
      if (!item.sale_price && item.min_price) item.sale_price = item.min_price;
      if (!item.store && item.best_store) item.store = item.best_store;
      var key = (item.name || '').toLowerCase().trim().substring(0, 50);
      if (!seenNames[key]) {
        seenNames[key] = true;
        allItems.push(item);
      }
    });
  }

  if (allItems.length > 0) {
    var html = '';
    allItems.forEach(function(item) { html += buildCard(item); });
    ppGrid.insertAdjacentHTML('beforeend', html);
    ppCount.textContent = allItems.length + ' termék';
    ppQuery = await translateToEnglish(query);
    ppDone = false;
  } else {
    ppQuery = await translateToEnglish(query);
    loadProductPage();
  }
}

const chatTray = document.getElementById('chat-tray');

async function sendMessage() {
  const text = input.value.trim();
  const hasImage = !!pendingImage;
  if (!text && !hasImage) return;

  input.value = '';

  // Show user message with optional image
  if (hasImage && text) {
    addMessage('<img src="'+pendingImage+'" style="max-height:80px;border-radius:8px;margin-bottom:4px;display:block" />' + text, 'user');
  } else if (hasImage) {
    addMessage('<img src="'+pendingImage+'" style="max-height:80px;border-radius:8px" />', 'user');
  } else {
    addMessage(text, 'user');
  }

  typingEl.style.display = 'block';
  try {
    const body = { session_id: sessionId, lang: currentLang };
    if (text) body.message = text;
    if (hasImage) body.image = pendingImage;

    const sentImage = pendingImage;
    removeImage();

    const res = await fetch('https://inaya.hu/api/v1/assistant/stream', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });

    if (!res.ok || !res.body) {
      // Fallback: nem-streaming endpoint
      const res2 = await fetch('https://inaya.hu/api/v1/assistant', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res2.json();
      if (data.session_id) sessionId = data.session_id;
      typingEl.style.display = 'none';
      addMessage(data.response || 'Hiba történt.', 'ai');
      if (data.products && data.products.length > 0) {
        openProductPanel(text || 'product', data.products);
      }
      return;
    }

    // Streaming: SSE olvasás
    typingEl.style.display = 'none';
    const aiDiv = document.createElement('div');
    aiDiv.className = 'message ai';
    aiDiv.innerHTML = '<div class="name">INAYA</div><span></span>';
    messages.appendChild(aiDiv);
    const aiSpan = aiDiv.querySelector('span');
    let streamProducts = null;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop(); // utolsó (nem teljes) sor marad

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const dataStr = line.slice(6);
          try {
            const payload = JSON.parse(dataStr);
            if (eventType === 'session') {
              if (payload.session_id) sessionId = payload.session_id;
            } else if (eventType === 'text') {
              aiSpan.textContent += payload.text;
              messages.scrollTop = messages.scrollHeight;
            } else if (eventType === 'products') {
              streamProducts = payload;
            } else if (eventType === 'error') {
              aiSpan.textContent += payload.error || 'Hiba történt.';
            }
          } catch(pe) {}
          eventType = '';
        }
      }
    }

    // Markdown táblázat renderelés (ha van | karakter a válaszban)
    const finalText = aiSpan.textContent;
    if (finalText.includes('|') && finalText.includes('---')) {
      aiSpan.innerHTML = finalText
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    // Termékek megjelenítése a stream végén
    if (streamProducts && streamProducts.length > 0) {
      openProductPanel(text || 'product', streamProducts);
    } else {
      // Fallback: ha nem jöttek termékek a streamből, keresés a deals API-n
      openProductPanel(text || 'product', null);
    }
  } catch(e) {
    typingEl.style.display = 'none';
    addMessage(t('errorMsg') + (e.message || e.toString()), 'ai');
  }
}

// Welcome message
addMessage(t('welcome'), 'ai');

// === VILLÁM EFFEKT ===
(function() {
  const lc = document.getElementById('lightning-canvas');
  if (!lc) return;
  const ctx = lc.getContext('2d');

  function resize() {
    const s = Math.max(window.innerWidth, window.innerHeight);
    lc.width = s;
    lc.height = s;
    lc.style.width = s + 'px';
    lc.style.height = s + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  const cx = () => lc.width / 2;
  const cy = () => lc.height / 2;
  // Gyűrű sugarak vh-ban, pixelre konvertálva
  const innerR = () => window.innerHeight * 0.29;
  const outerR = () => window.innerHeight * 0.36;

  function drawLightningBolt(x1, y1, x2, y2, width, generations) {
    if (generations <= 0) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      return;
    }
    const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 30;
    const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 30;

    ctx.lineWidth = width;
    drawLightningBolt(x1, y1, midX, midY, width * 0.8, generations - 1);
    drawLightningBolt(midX, midY, x2, y2, width * 0.8, generations - 1);

    // Elágazás
    if (Math.random() > 0.6 && generations > 1) {
      const branchAngle = (Math.random() - 0.5) * 1.2;
      const len = Math.sqrt((x2 - midX) ** 2 + (y2 - midY) ** 2) * 0.6;
      const angle = Math.atan2(y2 - y1, x2 - x1) + branchAngle;
      const bx = midX + Math.cos(angle) * len;
      const by = midY + Math.sin(angle) * len;
      ctx.lineWidth = width * 0.4;
      drawLightningBolt(midX, midY, bx, by, width * 0.3, generations - 2);
    }
  }

  let bolts = [];
  let nextBolt = 0;

  function spawnBolt() {
    // Kezdőpont a belső körön, végpont a külső körön
    const angle1 = Math.random() * Math.PI * 2;
    const angle2 = angle1 + (Math.random() - 0.5) * 0.8;
    const r1 = innerR();
    const r2 = outerR();
    const cX = cx();
    const cY = cy();

    bolts.push({
      x1: cX + Math.cos(angle1) * r1,
      y1: cY + Math.sin(angle1) * r1,
      x2: cX + Math.cos(angle2) * r2,
      y2: cY + Math.sin(angle2) * r2,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      flicker: 0
    });
  }

  function animate() {
    ctx.clearRect(0, 0, lc.width, lc.height);

    const now = Date.now();
    // Új villám időnként
    if (now > nextBolt) {
      spawnBolt();
      if (bolts.length < 4) {
        spawnBolt();
        if (Math.random() > 0.6) spawnBolt();
      }
      nextBolt = now + 1200 + Math.random() * 1500;
    }

    for (let i = bolts.length - 1; i >= 0; i--) {
      const b = bolts[i];
      b.life -= b.decay;
      b.flicker = Math.random();

      if (b.life <= 0) {
        bolts.splice(i, 1);
        continue;
      }

      const alpha = b.life * (b.flicker > 0.3 ? 1 : 0.3);

      // Fény glow
      ctx.shadowColor = 'rgba(180,130,20,' + (alpha * 0.9) + ')';
      ctx.shadowBlur = 25;
      ctx.strokeStyle = 'rgba(200,155,40,' + alpha + ')';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      drawLightningBolt(b.x1, b.y1, b.x2, b.y2, 2.5, 3);

      // Belső fényes mag
      ctx.shadowColor = 'rgba(212,170,50,' + (alpha * 0.7) + ')';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = 'rgba(230,190,70,' + (alpha * 0.8) + ')';
      ctx.lineWidth = 1.2;
      drawLightningBolt(b.x1, b.y1, b.x2, b.y2, 1.2, 2);
    }

    ctx.shadowBlur = 0;
    requestAnimationFrame(animate);
  }
  animate();
})();

</script>
