<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inaya AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; }

  #video-wrap {
    position:fixed; inset:0; z-index:1;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #video-container { position:relative; }
  #bg-video { width:100%; height:100%; display:block; }

  .holo-unit {
    position:absolute; z-index:5;
    display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none;
    transform:translate(-50%,-50%);
  }
  .holo-unit.float { opacity:1; pointer-events:all; }
  @keyframes unitAppear {
    0%  { opacity:0; transform:translate(-50%,-50%) scale(0.3) translateY(25px); }
    60% { opacity:1; transform:translate(-50%,-50%) scale(1.08) translateY(-5px); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1) translateY(0); }
  }

  .holo-orb {
    width:54px; height:54px; border-radius:50%;
    background:radial-gradient(circle, rgba(0,220,255,0.28) 0%, transparent 70%);
    border:1.5px solid rgba(0,220,255,0.7);
    box-shadow:0 0 16px rgba(0,200,255,0.65), 0 0 35px rgba(0,150,255,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; position:relative; flex-shrink:0;
    animation:orbPulse 2.2s ease-in-out infinite;
  }
  .gold .holo-orb {
    border-color:rgba(255,220,50,0.75);
    background:radial-gradient(circle, rgba(255,200,0,0.22) 0%, transparent 70%);
    box-shadow:0 0 16px rgba(255,200,0,0.6), 0 0 35px rgba(200,150,0,0.3);
    animation:orbPulseGold 2.2s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100%{ box-shadow:0 0 16px rgba(0,200,255,0.65), 0 0 35px rgba(0,150,255,0.3); }
    50%    { box-shadow:0 0 28px rgba(0,220,255,1), 0 0 55px rgba(0,180,255,0.6); }
  }
  @keyframes orbPulseGold {
    0%,100%{ box-shadow:0 0 16px rgba(255,200,0,0.6), 0 0 35px rgba(200,150,0,0.3); }
    50%    { box-shadow:0 0 28px rgba(255,220,0,1), 0 0 55px rgba(200,160,0,0.6); }
  }
  .holo-orb:hover { transform:scale(1.18); }
  .holo-orb::before {
    content:''; position:absolute; inset:-7px; border-radius:50%;
    border:1.5px solid transparent;
    border-top-color:rgba(0,220,255,0.95); border-right-color:rgba(0,220,255,0.35);
    animation:spinCW 1.8s linear infinite;
  }
  .holo-orb::after {
    content:''; position:absolute; inset:-14px; border-radius:50%;
    border:1px solid transparent;
    border-bottom-color:rgba(0,200,255,0.55); border-left-color:rgba(0,200,255,0.2);
    animation:spinCCW 2.8s linear infinite;
  }
  .gold .holo-orb::before { border-top-color:rgba(255,220,50,0.95); border-right-color:rgba(255,200,0,0.35); }
  .gold .holo-orb::after  { border-bottom-color:rgba(255,200,0,0.55); border-left-color:rgba(255,180,0,0.2); }
  @keyframes spinCW  { to { transform:rotate(360deg); } }
  @keyframes spinCCW { to { transform:rotate(-360deg); } }

  .holo-beam {
    width:3px; height:20%; position:relative;
    background:linear-gradient(to bottom, rgba(0,210,255,0.9), rgba(0,150,255,0.15), transparent);
    box-shadow:0 0 10px rgba(0,200,255,0.7); border-radius:0 0 3px 3px; flex-shrink:0;
    animation:beamPulse 2.2s ease-in-out infinite;
  }
  .gold .holo-beam {
    background:linear-gradient(to bottom, rgba(255,210,0,0.9), rgba(150,100,0,0.15), transparent);
    box-shadow:0 0 10px rgba(255,200,0,0.7);
    animation:beamPulseGold 2.2s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100%{opacity:0.7} 50%{opacity:1;box-shadow:0 0 18px rgba(0,220,255,1)} }
  @keyframes beamPulseGold { 0%,100%{opacity:0.7} 50%{opacity:1;box-shadow:0 0 18px rgba(255,220,0,1)} }
  .bp {
    position:absolute; left:50%; margin-left:-2px;
    width:4px; height:4px; border-radius:50%;
    background:#00d4ff; box-shadow:0 0 5px #00d4ff;
    animation:bpDrop 1.8s ease-in-out infinite; opacity:0;
  }
  .gold .bp { background:#ffd000; box-shadow:0 0 5px #ffd000; }
  .bp:nth-child(1){top:8%;animation-delay:0s}
  .bp:nth-child(2){top:32%;animation-delay:0.45s}
  .bp:nth-child(3){top:58%;animation-delay:0.9s}
  .bp:nth-child(4){top:80%;animation-delay:1.35s}
  @keyframes bpDrop {
    0%{opacity:0;transform:translateY(-5px) scale(0.4)}
    35%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(10px) scale(0.2)}
  }

  #table-effect {
    position:absolute;
    left:7.78%; top:75.23%; width:87.26%; height:13.86%;
    z-index:6; pointer-events:none; border-radius:50%;
    background:radial-gradient(ellipse at 50% 50%,
      rgba(255,255,0,1) 0%, rgba(255,210,0,0.9) 25%,
      rgba(255,150,0,0.7) 50%, rgba(255,80,0,0.4) 75%, transparent 100%);
    box-shadow:0 0 40px 15px rgba(255,220,0,0.9), 0 0 80px 30px rgba(255,160,0,0.6);
    animation:firePulse 0.8s ease-in-out infinite;
  }
  @keyframes firePulse { 0%,100%{opacity:0.85;filter:brightness(1.3)} 50%{opacity:1;filter:brightness(1.9)} }

  #fade {
    position:fixed; bottom:0; left:0; right:0; height:30%;
    background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.15) 40%,transparent 70%);
    z-index:8; pointer-events:none;
  }

  /* === GOLD MODAL === */
  #modal-overlay {
    position:fixed; inset:0; z-index:50;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.5);
    animation:modalFadeIn 0.3s ease;
  }
  #modal-overlay.active { display:flex; }
  @keyframes modalFadeIn { from{opacity:0} to{opacity:1} }

  #modal-box {
    width:480px; max-width:85vw; max-height:88vh;
    background:transparent;
    border:1.5px solid rgba(212,160,23,0.6);
    border-radius:20px;
    backdrop-filter:blur(6px);
    box-shadow:0 0 40px rgba(212,160,23,0.35), 0 0 80px rgba(212,160,23,0.15), inset 0 0 30px rgba(212,160,23,0.08), inset 0 1px 0 rgba(255,220,100,0.2);
    padding:28px 24px;
    color:#fff;
    overflow-y:auto;
    animation:modalSlideIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes modalSlideIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

  #modal-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; padding-bottom:12px;
    border-bottom:1px solid rgba(212,160,23,0.25);
  }
  #modal-title {
    font-family:'Orbitron',sans-serif;
    font-size:14px; letter-spacing:3px;
    color:#d4a017;
  }
  #modal-icon { font-size:28px; margin-right:12px; }
  #modal-close {
    width:32px; height:32px; border-radius:50%;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.3);
    color:#d4a017; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #modal-close:hover { background:rgba(212,160,23,0.3); transform:scale(1.1); }
  #modal-body {
    font-family:'Rajdhani',sans-serif;
    font-size:15px; line-height:1.6;
    color:rgba(255,255,255,0.8);
  }
  #modal-body .loading {
    text-align:center; padding:30px;
    color:#d4a017;
  }

  /* === CHAT === */
  #chat-section {
    position:absolute; z-index:10;
    left:50%; top:78%;
    transform:translate(-50%,-50%);
    width:42%; max-width:400px; min-width:260px;
  }
  #chat-holo-frame {
    background:rgba(0,20,60,0.55);
    border:1.5px solid rgba(0,180,255,0.5);
    border-radius:18px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(0,160,255,0.3), 0 0 60px rgba(0,120,255,0.1), inset 0 0 20px rgba(0,160,255,0.05);
    display:flex; flex-direction:column;
    overflow:hidden;
    animation:holoGlow 3s ease-in-out infinite;
  }
  @keyframes holoGlow {
    0%,100% { box-shadow:0 0 30px rgba(0,160,255,0.3), 0 0 60px rgba(0,120,255,0.1); border-color:rgba(0,180,255,0.5); }
    50% { box-shadow:0 0 40px rgba(0,180,255,0.5), 0 0 80px rgba(0,140,255,0.2); border-color:rgba(0,200,255,0.7); }
  }
  #chat-header {
    display:flex; align-items:center; gap:8px;
    padding:10px 16px;
    border-bottom:1px solid rgba(0,180,255,0.25);
    background:rgba(0,40,100,0.3);
  }
  #chat-header-dot {
    width:8px; height:8px; border-radius:50%;
    background:#00d4ff;
    box-shadow:0 0 8px #00d4ff;
    animation:dotBlink 2s ease-in-out infinite;
  }
  @keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #chat-header-title {
    font-family:'Orbitron',sans-serif;
    font-size:11px; letter-spacing:3px;
    color:rgba(0,200,255,0.85);
  }
  #chat-header-status {
    font-family:'Rajdhani',sans-serif;
    font-size:11px;
    color:rgba(0,200,255,0.45);
    margin-left:auto;
  }
  #chat-body {
    padding:12px 16px;
    flex:1;
  }
  #chat-footer {
    padding:10px 14px;
    border-top:1px solid rgba(0,180,255,0.15);
    background:rgba(0,30,80,0.2);
  }
  #chat-holo-beam {
    position:absolute; bottom:-40px; left:50%; transform:translateX(-50%);
    width:50%; height:40px;
    background:linear-gradient(to bottom, rgba(0,180,255,0.35), rgba(0,120,255,0.08), transparent);
    clip-path:polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
    pointer-events:none;
    animation:beamPulse 2.2s ease-in-out infinite;
  }
  .message { margin-bottom:8px; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .message.user { text-align:right; }
  .message.user span {
    display:inline-block; background:rgba(0,0,0,.75);
    border:1px solid rgba(0,180,255,0.4); color:#7dd3fc;
    padding:8px 14px; border-radius:16px 16px 4px 16px;
    font-size:14px; max-width:80%; backdrop-filter:blur(12px);
  }
  .message.ai span {
    display:inline-block; background:rgba(0,0,0,.75);
    border:1px solid rgba(0,180,255,.25); color:#ddd;
    padding:8px 14px; border-radius:16px 16px 16px 4px;
    font-size:14px; max-width:85%; backdrop-filter:blur(12px);
  }
  .message.ai .name {
    font-family:'Orbitron',sans-serif; font-size:9px;
    color:#00b4ff; letter-spacing:2px; margin-bottom:3px; opacity:.8;
  }
  #user-input {
    flex:1; background:rgba(0,0,0,.75);
    border:1px solid rgba(0,180,255,0.35); border-radius:12px;
    padding:13px 20px; color:#fff;
    font-family:'Rajdhani',sans-serif; font-size:15px; outline:none;
    backdrop-filter:blur(14px); transition:border-color .3s,box-shadow .3s;
  }
  #user-input:focus { border-color:rgba(0,200,255,0.7); box-shadow:0 0 20px rgba(0,180,255,.25); }
  #user-input::placeholder { color:rgba(255,255,255,.25); }
  #send-btn {
    width:44px; height:44px; border-radius:50%;
    background:radial-gradient(circle,rgba(0,180,255,0.8),rgba(0,120,200,0.9));
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 20px rgba(0,160,255,.45); transition:transform .2s,box-shadow .2s; flex-shrink:0;
  }
  #send-btn:hover { transform:scale(1.1); box-shadow:0 0 30px rgba(0,180,255,.65); }
  #send-btn svg { width:18px; height:18px; fill:#fff; }
  .dot-pulse span {
    display:inline-block; width:5px; height:5px; border-radius:50%;
    background:#00b4ff; margin:0 2px; animation:dotPulse 1.2s ease-in-out infinite;
  }
  .dot-pulse span:nth-child(2){animation-delay:.2s}
  .dot-pulse span:nth-child(3){animation-delay:.4s}
  @keyframes dotPulse { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
  #input-row { display:flex; gap:10px; align-items:center; }
  .jogi-link {
    display:flex; align-items:center;
    padding:14px 16px; border-radius:12px;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(212,160,23,0.25);
    color:#ddd; text-decoration:none;
    font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600;
    transition:all 0.2s;
  }
  .jogi-link:hover {
    background:rgba(212,160,23,0.12);
    border-color:rgba(212,160,23,0.5);
    color:#f0d060;
  }
  .lang-opt {
    padding:8px 12px; cursor:pointer; font-size:14px; color:#ddd;
    border-radius:8px; transition:all 0.2s; white-space:nowrap;
    font-family:'Rajdhani',sans-serif;
  }
  .lang-opt:hover { background:rgba(0,180,255,0.2); color:#7dd3fc; }
  .lang-opt.active { color:#00d4ff; font-weight:700; }
</style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
      <source src="/inaya-bg.mp4" type="video/mp4">

    <div id="table-effect"></div>

    <div class="holo-unit" id="u1">

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">

      <div style="display:flex;align-items:center">
        <span id="modal-icon"></span>
        <span id="modal-title"></span>
      </div>
      <button id="modal-close" onclick="closeModal()">&times;</button>

<script>
const VIDEO_W = 1280, VIDEO_H = 720;
const container = document.getElementById('video-container');
const bgVideo = document.getElementById('bg-video');

function resizeVideo() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const videoAspect = VIDEO_W / VIDEO_H;
  const screenAspect = vw / vh;
  if (screenAspect > videoAspect) {
    container.style.height = vh + 'px';
    container.style.width = (vh * videoAspect) + 'px';
    container.style.marginLeft = ((vw - vh * videoAspect) / 2) + 'px';
    container.style.marginTop = '0px';
  } else {
    container.style.width = vw + 'px';
    container.style.height = (vw / videoAspect) + 'px';
    container.style.marginTop = ((vh - vw / videoAspect) / 2) + 'px';
    container.style.marginLeft = '0px';
  }
}
window.addEventListener('resize', resizeVideo);
resizeVideo();

const basePos = {
  u1:{x:10.66,y:50.40}, u2:{x:17.82,y:52.65}, u3:{x:19.05,y:39.42},
  u4:{x:71.73,y:39.15}, u5:{x:83.13,y:51.32}, u6:{x:91.22,y:49.87},
};
const MOVE = {
  u1:{dx:-3.4,dy:0.3}, u2:{dx:-2.5,dy:-0.6}, u3:{dx:-1.7,dy:0.3},
  u4:{dx:3.6,dy:0.3}, u5:{dx:2.3,dy:-0.8}, u6:{dx:1.7,dy:0.3},
};

let activated = false;
window.addEventListener('load', () => { setTimeout(showIcons, 800); });

function showIcons() {
  if (activated) return;
  activated = true;
  ['u1','u2','u3','u4','u5','u6'].forEach((id, i) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      el.style.animation = 'unitAppear 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards';
      setTimeout(() => { el.style.animation = ''; el.classList.add('float'); }, 700);
    }, i * 220);
  });
}

function trackTick() {
  const t = bgVideo.currentTime || 0;
  const dur = bgVideo.duration || 4.0;
  const progress = t <= dur/2 ? t/(dur/2) : 1 - (t-dur/2)/(dur/2);
  ['u1','u2','u3','u4','u5','u6'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || !el.classList.contains('float')) return;
    const m = MOVE[id];
    el.style.left = (basePos[id].x + m.dx * progress) + '%';
    el.style.top  = (basePos[id].y + m.dy * progress) + '%';
  });
  requestAnimationFrame(trackTick);
}
requestAnimationFrame(trackTick);

// === MODAL ===
const API = 'https://h104-64.rackhostvps.com/api/v1';
const modalData = {
  kuponok:   { icon:'🎟️', title:'KUPONOK', searchable:true, placeholder:'Keress kuponokat...' },
  akciok:    { icon:'🔥', title:'AKCIÓK', searchable:true, placeholder:'Keress akciókat...' },
  kedvencek: { icon:'⭐', title:'KEDVENCEK', searchable:false },
  boltok:    { icon:'🏪', title:'ÁRUHÁZAK', searchable:false },

let currentModalType = null;

function openModal(type) {
  const data = modalData[type];
  if (!data) return;
  currentModalType = type;
  document.getElementById('modal-icon').textContent = data.icon;
  document.getElementById('modal-title').textContent = data.title;

  if (type === 'jogi') {
    const jogiLabels = {
      hu: { privacy:'Adatvédelmi tájékoztató', terms:'Felhasználási feltételek', cookies:'Cookie szabályzat', partner:'Partneri tájékoztató' },
      ro: { privacy:'Politica de confidențialitate', terms:'Termeni și condiții', cookies:'Politica cookie', partner:'Informații parteneri' },
      en: { privacy:'Privacy Policy', terms:'Terms of Use', cookies:'Cookie Policy', partner:'Partner Information' },
      de: { privacy:'Datenschutzrichtlinie', terms:'Nutzungsbedingungen', cookies:'Cookie-Richtlinie', partner:'Partnerinformationen' },
      uk: { privacy:'Політика конфіденційності', terms:'Умови використання', cookies:'Політика cookies', partner:'Інформація для партнерів' }
    };
    const labels = jogiLabels[currentLang] || jogiLabels.hu;
    document.getElementById('modal-body').innerHTML =
      '<div style="display:flex;flex-direction:column;gap:8px">' +
        '<div class="jogi-link" onclick="window.top.location.href=\'/adatvedelem\'" style="cursor:pointer">' +
          '<span style="margin-right:8px">🔒</span>' + labels.privacy +
        '</div>' +
        '<div class="jogi-link" onclick="window.top.location.href=\'/felhasznalasi-feltetelek\'" style="cursor:pointer">' +
          '<span style="margin-right:8px">📜</span>' + labels.terms +
        '</div>' +
        '<div class="jogi-link" onclick="window.top.location.href=\'/suti-szabalyzat\'" style="cursor:pointer">' +
          '<span style="margin-right:8px">🍪</span>' + labels.cookies +
        '</div>' +
        '<div class="jogi-link" onclick="window.top.location.href=\'/partneri-tajekoztato\'" style="cursor:pointer">' +
          '<span style="margin-right:8px">🤝</span>' + labels.partner +
        '</div>' +
      '</div>';
    document.getElementById('modal-overlay').classList.add('active');
    return;
  }

  if (data.searchable) {
    document.getElementById('modal-body').innerHTML =
      '<div style="margin-bottom:14px">' +
        '<input id="modal-search" type="text" placeholder="' + data.placeholder + '" style="' +
          'width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(212,160,23,0.4);' +
          'border-radius:14px;padding:10px 16px;color:#fff;font-family:Rajdhani,sans-serif;' +
          'font-size:15px;outline:none;backdrop-filter:blur(8px);" />' +
      '</div>' +
      '<div id="modal-results" style="min-height:60px"></div>';
    const searchInput = document.getElementById('modal-search');
    searchInput.focus();
    let debounce = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => modalSearch(searchInput.value.trim()), 350);
    });
    // Load initial results
    modalSearch('');
  } else {
    document.getElementById('modal-body').innerHTML = '<div class="loading">Hamarosan elérhető...</div>';
  }

  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  currentModalType = null;
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

async function modalSearch(query) {
  const resultsEl = document.getElementById('modal-results');
  if (!resultsEl) return;
  resultsEl.innerHTML = '<div class="loading" style="color:#d4a017;text-align:center;padding:20px"><div class="dot-pulse"><span></span><span></span><span></span></div></div>';

  try {
    let url;
    if (query.length > 0) {
      url = API + '/search/?q=' + encodeURIComponent(query) + '&limit=12';
    } else {
      url = API + '/products/?limit=12';
    }
    const res = await fetch(url);
    const data = await res.json();
    const items = data.hits || data.items || [];

    if (items.length === 0) {
      resultsEl.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:30px">' + t('noResults') + '</div>';
      return;
    }

    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">';
    items.forEach(item => {
      const price = item.min_price ? formatPrice(item.min_price) : '';
      const store = item.best_store || (item.stores && item.stores[0]) || '';
      html += '<div style="background:rgba(0,0,0,0.35);border:1px solid rgba(212,160,23,0.2);border-radius:12px;padding:10px;cursor:pointer;transition:all 0.2s" onmouseover="this.style.borderColor=\'rgba(212,160,23,0.6)\'" onmouseout="this.style.borderColor=\'rgba(212,160,23,0.2)\'">';
      if (item.image_url) {
        html += '<img src="' + item.image_url + '" style="width:100%;height:80px;object-fit:contain;border-radius:8px;margin-bottom:6px" onerror="this.style.display=\'none\'" />';
      }
      html += '<div style="font-size:12px;color:#fff;font-weight:600;line-height:1.3;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">' + (item.name||'') + '</div>';
      if (price) html += '<div style="font-size:13px;color:#f0d060;font-weight:700">' + price + '</div>';
      if (store) html += '<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px">' + store + '</div>';
      html += '</div>';
    });
    html += '</div>';
    resultsEl.innerHTML = html;
  } catch(e) {
    resultsEl.innerHTML = '<div style="text-align:center;color:#ff6b6b;padding:20px">Hiba a betöltésnél</div>';
  }
}

function t(key) {
  return i18n[currentLang]?.[key] || i18n['hu'][key] || key;
}

function formatPrice(amount) {
  if (!amount) return '';
  const lang = i18n[currentLang] || i18n['hu'];
  const val = Math.round(amount).toLocaleString(currentLang === 'hu' ? 'hu' : currentLang);
  return lang.currencyPos === 'before'
    ? lang.currencySymbol + ' ' + val
    : val + ' ' + lang.currencySymbol;
}

function applyLanguage() {
  // Chat header
  const titleEl = document.getElementById('chat-header-title');
  const statusEl = document.getElementById('chat-header-status');
  if (titleEl) titleEl.textContent = t('chatTitle');
  if (statusEl) statusEl.textContent = t('chatStatus');

  // Input placeholder
  input.placeholder = t('placeholder');

  // Modal titles if open
  if (currentModalType) {
    const titles = t('modalTitles');
    const titleEl2 = document.getElementById('modal-title');
    if (titleEl2 && titles[currentModalType]) titleEl2.textContent = titles[currentModalType];
  }

  // Notify parent Lovable app
  window.parent.postMessage({ type: 'inaya-lang-change', lang: currentLang }, '*');
}

function toggleLangMenu(e) {
  e.stopPropagation();
  langMenu.style.display = langMenu.style.display === 'none' ? 'block' : 'none';
  updateLangHighlight();
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('inaya_lang', lang);
  langMenu.style.display = 'none';

  // Clear chat and show welcome in new language
  messages.innerHTML = '';
  addMessage(t('welcome'), 'ai');

  // Clear session for fresh AI responses in new language
  sessionId = null;

  applyLanguage();
  updateLangHighlight();
}

function updateLangHighlight() {
  document.querySelectorAll('.lang-opt').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick').includes("'" + currentLang + "'"));
  });
}

document.addEventListener('click', () => { langMenu.style.display = 'none'; });

let sessionId = null;
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const messages = document.getElementById('chat-messages');
const typingEl = document.getElementById('typing');

// Apply saved language on load
applyLanguage();

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = role === 'ai'
    ? '<div class="name">INAYA</div><span>' + text + '</span>'
    : '<span>' + text + '</span>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  typingEl.style.display = 'block';
  try {
    const res = await fetch('https://h104-64.rackhostvps.com/api/v1/assistant', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, session_id: sessionId, lang: currentLang })
    });
    const data = await res.json();
    if (data.session_id) sessionId = data.session_id;
    typingEl.style.display = 'none';
    addMessage(data.response || 'Hiba történt.', 'ai');
    if (data.products && data.products.length > 0) {
      let cards = '<div style="display:flex;gap:8px;overflow-x:auto;padding:6px 0;scrollbar-width:none">';
      data.products.forEach(p => {
        const price = p.min_price ? formatPrice(p.min_price) : '';
        cards += '<div style="min-width:120px;background:rgba(0,40,100,0.4);border:1px solid rgba(0,180,255,0.25);border-radius:10px;padding:8px;flex-shrink:0">';
        if (p.image_url) cards += '<img src="'+p.image_url+'" style="width:100%;height:60px;object-fit:contain;border-radius:6px;margin-bottom:4px" onerror="this.style.display=\'none\'" />';
        cards += '<div style="font-size:11px;color:#fff;line-height:1.2;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+p.name+'</div>';
        if (price) cards += '<div style="font-size:12px;color:#7dd3fc;font-weight:700">'+price+'</div>';
        if (p.best_store) cards += '<div style="font-size:9px;color:rgba(255,255,255,0.4)">'+p.best_store+'</div>';
        cards += '</div>';
      });
      cards += '</div>';
      addMessage(cards, 'ai');
    }
  } catch(e) {
    typingEl.style.display = 'none';
    addMessage(t('errorMsg') + (e.message || e.toString()), 'ai');
  }
}

// Welcome message
addMessage(t('welcome'), 'ai');

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
