<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inaya AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; }

  #video-wrap {
    position:fixed; inset:0; z-index:1;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #video-container { position:relative; }
  #bg-video { width:100%; height:100%; display:block; }

  .holo-unit {
    position:absolute; z-index:5;
    display:flex; flex-direction:column; align-items:center;
    opacity:0; pointer-events:none;
    transform:translate(-50%,-50%);
  }
  .holo-unit.float { opacity:1; pointer-events:all; }
  @keyframes unitAppear {
    0%  { opacity:0; transform:translate(-50%,-50%) scale(0.3) translateY(25px); }
    60% { opacity:1; transform:translate(-50%,-50%) scale(1.08) translateY(-5px); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1) translateY(0); }
  }

  .holo-orb {
    width:54px; height:54px; border-radius:50%;
    background:radial-gradient(circle, rgba(0,220,255,0.28) 0%, transparent 70%);
    border:1.5px solid rgba(0,220,255,0.7);
    box-shadow:0 0 16px rgba(0,200,255,0.65), 0 0 35px rgba(0,150,255,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; position:relative; flex-shrink:0;
    animation:orbPulse 2.2s ease-in-out infinite;
  }
  .gold .holo-orb {
    border-color:rgba(255,220,50,0.75);
    background:radial-gradient(circle, rgba(255,200,0,0.22) 0%, transparent 70%);
    box-shadow:0 0 16px rgba(255,200,0,0.6), 0 0 35px rgba(200,150,0,0.3);
    animation:orbPulseGold 2.2s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100%{ box-shadow:0 0 16px rgba(0,200,255,0.65), 0 0 35px rgba(0,150,255,0.3); }
    50%    { box-shadow:0 0 28px rgba(0,220,255,1), 0 0 55px rgba(0,180,255,0.6); }
  }
  @keyframes orbPulseGold {
    0%,100%{ box-shadow:0 0 16px rgba(255,200,0,0.6), 0 0 35px rgba(200,150,0,0.3); }
    50%    { box-shadow:0 0 28px rgba(255,220,0,1), 0 0 55px rgba(200,160,0,0.6); }
  }
  .holo-orb:hover { transform:scale(1.18); }
  .holo-orb::before {
    content:''; position:absolute; inset:-7px; border-radius:50%;
    border:1.5px solid transparent;
    border-top-color:rgba(0,220,255,0.95); border-right-color:rgba(0,220,255,0.35);
    animation:spinCW 1.8s linear infinite;
  }
  .holo-orb::after {
    content:''; position:absolute; inset:-14px; border-radius:50%;
    border:1px solid transparent;
    border-bottom-color:rgba(0,200,255,0.55); border-left-color:rgba(0,200,255,0.2);
    animation:spinCCW 2.8s linear infinite;
  }
  .gold .holo-orb::before { border-top-color:rgba(255,220,50,0.95); border-right-color:rgba(255,200,0,0.35); }
  .gold .holo-orb::after  { border-bottom-color:rgba(255,200,0,0.55); border-left-color:rgba(255,180,0,0.2); }
  @keyframes spinCW  { to { transform:rotate(360deg); } }
  @keyframes spinCCW { to { transform:rotate(-360deg); } }

  .holo-beam {
    width:3px; height:20%; position:relative;
    background:linear-gradient(to bottom, rgba(0,210,255,0.9), rgba(0,150,255,0.15), transparent);
    box-shadow:0 0 10px rgba(0,200,255,0.7); border-radius:0 0 3px 3px; flex-shrink:0;
    animation:beamPulse 2.2s ease-in-out infinite;
  }
  .gold .holo-beam {
    background:linear-gradient(to bottom, rgba(255,210,0,0.9), rgba(150,100,0,0.15), transparent);
    box-shadow:0 0 10px rgba(255,200,0,0.7);
    animation:beamPulseGold 2.2s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100%{opacity:0.7} 50%{opacity:1;box-shadow:0 0 18px rgba(0,220,255,1)} }
  @keyframes beamPulseGold { 0%,100%{opacity:0.7} 50%{opacity:1;box-shadow:0 0 18px rgba(255,220,0,1)} }
  .bp {
    position:absolute; left:50%; margin-left:-2px;
    width:4px; height:4px; border-radius:50%;
    background:#00d4ff; box-shadow:0 0 5px #00d4ff;
    animation:bpDrop 1.8s ease-in-out infinite; opacity:0;
  }
  .gold .bp { background:#ffd000; box-shadow:0 0 5px #ffd000; }
  .bp:nth-child(1){top:8%;animation-delay:0s}
  .bp:nth-child(2){top:32%;animation-delay:0.45s}
  .bp:nth-child(3){top:58%;animation-delay:0.9s}
  .bp:nth-child(4){top:80%;animation-delay:1.35s}
  @keyframes bpDrop {
    0%{opacity:0;transform:translateY(-5px) scale(0.4)}
    35%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(10px) scale(0.2)}
  }

  #table-effect {
    position:absolute;
    left:7.78%; top:75.23%; width:87.26%; height:13.86%;
    z-index:6; pointer-events:none; border-radius:50%;
    background:radial-gradient(ellipse at 50% 50%,
      rgba(255,255,0,1) 0%, rgba(255,210,0,0.9) 25%,
      rgba(255,150,0,0.7) 50%, rgba(255,80,0,0.4) 75%, transparent 100%);
    box-shadow:0 0 40px 15px rgba(255,220,0,0.9), 0 0 80px 30px rgba(255,160,0,0.6);
    animation:firePulse 0.8s ease-in-out infinite;
  }
  @keyframes firePulse { 0%,100%{opacity:0.85;filter:brightness(1.3)} 50%{opacity:1;filter:brightness(1.9)} }

  #fade {
    position:fixed; bottom:0; left:0; right:0; height:30%;
    background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.15) 40%,transparent 70%);
    z-index:8; pointer-events:none;
  }

  /* === GOLD MODAL === */
  #modal-overlay {
    position:fixed; inset:0; z-index:50;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.5);
    animation:modalFadeIn 0.3s ease;
  }
  #modal-overlay.active { display:flex; }
  @keyframes modalFadeIn { from{opacity:0} to{opacity:1} }

  #modal-box {
    width:500px; max-width:90vw; max-height:75vh;
    background:rgba(180,130,10,0.2);
    border:1.5px solid rgba(212,160,23,0.6);
    border-radius:20px;
    backdrop-filter:blur(16px);
    box-shadow:0 0 40px rgba(212,160,23,0.35), 0 0 80px rgba(212,160,23,0.15), inset 0 0 30px rgba(212,160,23,0.08), inset 0 1px 0 rgba(255,220,100,0.2);
    padding:28px 24px;
    color:#fff;
    overflow-y:auto;
    animation:modalSlideIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes modalSlideIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

  #modal-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; padding-bottom:12px;
    border-bottom:1px solid rgba(212,160,23,0.25);
  }
  #modal-title {
    font-family:'Orbitron',sans-serif;
    font-size:14px; letter-spacing:3px;
    color:#d4a017;
  }
  #modal-icon { font-size:28px; margin-right:12px; }
  #modal-close {
    width:32px; height:32px; border-radius:50%;
    background:rgba(212,160,23,0.15); border:1px solid rgba(212,160,23,0.3);
    color:#d4a017; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s;
  }
  #modal-close:hover { background:rgba(212,160,23,0.3); transform:scale(1.1); }
  #modal-body {
    font-family:'Rajdhani',sans-serif;
    font-size:15px; line-height:1.6;
    color:rgba(255,255,255,0.8);
  }
  #modal-body .loading {
    text-align:center; padding:30px;
    color:#d4a017;
  }

  /* === CHAT === */
  #chat-section {
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    width:580px; max-width:92vw; z-index:10;
  }
  .message { margin-bottom:8px; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .message.user { text-align:right; }
  .message.user span {
    display:inline-block; background:rgba(0,0,0,.75);
    border:1px solid rgba(212,160,23,.4); color:#f0d060;
    padding:8px 14px; border-radius:16px 16px 4px 16px;
    font-size:14px; max-width:80%; backdrop-filter:blur(12px);
  }
  .message.ai span {
    display:inline-block; background:rgba(0,0,0,.75);
    border:1px solid rgba(0,180,255,.25); color:#ddd;
    padding:8px 14px; border-radius:16px 16px 16px 4px;
    font-size:14px; max-width:85%; backdrop-filter:blur(12px);
  }
  .message.ai .name {
    font-family:'Orbitron',sans-serif; font-size:9px;
    color:#d4a017; letter-spacing:2px; margin-bottom:3px; opacity:.7;
  }
  #user-input {
    flex:1; background:rgba(0,0,0,.75);
    border:1px solid rgba(212,160,23,.35); border-radius:28px;
    padding:13px 20px; color:#fff;
    font-family:'Rajdhani',sans-serif; font-size:15px; outline:none;
    backdrop-filter:blur(14px); transition:border-color .3s,box-shadow .3s;
  }
  #user-input:focus { border-color:#d4a017; box-shadow:0 0 20px rgba(212,160,23,.2); }
  #user-input::placeholder { color:rgba(255,255,255,.25); }
  #send-btn {
    width:44px; height:44px; border-radius:50%;
    background:radial-gradient(circle,#d4a017,#b8860b);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 20px rgba(212,160,23,.45); transition:transform .2s,box-shadow .2s; flex-shrink:0;
  }
  #send-btn:hover { transform:scale(1.1); box-shadow:0 0 30px rgba(212,160,23,.65); }
  #send-btn svg { width:18px; height:18px; fill:#000; }
  .dot-pulse span {
    display:inline-block; width:5px; height:5px; border-radius:50%;
    background:#d4a017; margin:0 2px; animation:dotPulse 1.2s ease-in-out infinite;
  }
  .dot-pulse span:nth-child(2){animation-delay:.2s}
  .dot-pulse span:nth-child(3){animation-delay:.4s}
  @keyframes dotPulse { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
  #input-row { display:flex; gap:10px; align-items:center; }
</style>
</head>
<body>

<div id="video-wrap">
  <div id="video-container">
    <video id="bg-video" autoplay loop muted playsinline>
      <source src="/inaya-bg.mp4" type="video/mp4">
    </video>

    <div id="table-effect"></div>

    <div class="holo-unit" id="u1">
      <div class="holo-orb" onclick="openModal('kuponok')">🎟️</div>
      <div class="holo-beam"><div class="bp"></div><div class="bp"></div><div class="bp"></div><div class="bp"></div></div>
    </div>
    <div class="holo-unit" id="u2">
      <div class="holo-orb" onclick="openModal('akciok')">🔥</div>
      <div class="holo-beam"><div class="bp"></div><div class="bp"></div><div class="bp"></div><div class="bp"></div></div>
    </div>
    <div class="holo-unit gold" id="u3">
      <div class="holo-orb" onclick="openModal('kedvencek')">⭐</div>
      <div class="holo-beam"><div class="bp"></div><div class="bp"></div><div class="bp"></div><div class="bp"></div></div>
    </div>
    <div class="holo-unit" id="u4">
      <div class="holo-orb" onclick="openModal('boltok')"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(0,220,255,0.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1-5h16l1 5"></path><path d="M3 9a2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0 2 2 2 2 0 0 0 2-2"></path><path d="M5 20v-9"></path><path d="M19 20v-9"></path><rect x="8" y="14" width="8" height="6" rx="1"></rect></svg></div>
      <div class="holo-beam"><div class="bp"></div><div class="bp"></div><div class="bp"></div><div class="bp"></div></div>
    </div>
    <div class="holo-unit" id="u5">
      <div class="holo-orb" onclick="openModal('termekek')"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(0,220,255,0.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg></div>
      <div class="holo-beam"><div class="bp"></div><div class="bp"></div><div class="bp"></div><div class="bp"></div></div>
    </div>
    <div class="holo-unit" id="u6">
      <div class="holo-orb" onclick="openModal('jogi')"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(0,220,255,0.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9 12l2 2 4-4"></path></svg></div>
      <div class="holo-beam"><div class="bp"></div><div class="bp"></div><div class="bp"></div><div class="bp"></div></div>
    </div>
  </div>
</div>

<div id="fade"></div>

<!-- GOLD MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div id="modal-header">
      <div style="display:flex;align-items:center">
        <span id="modal-icon"></span>
        <span id="modal-title"></span>
      </div>
      <button id="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="chat-section">
  <div id="chat-messages" style="max-height:35vh;overflow-y:auto;margin-bottom:10px;scrollbar-width:none;"></div>
  <div id="typing" style="display:none"><div class="message ai"><div class="name">INAYA</div><span><div class="dot-pulse"><span></span><span></span><span></span></div></span></div></div>
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Kérdezz valamit...">
    <button id="send-btn"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"></path></svg></button>
  </div>
</div>

<script>
const VIDEO_W = 1280, VIDEO_H = 720;
const container = document.getElementById('video-container');
const bgVideo = document.getElementById('bg-video');

function resizeVideo() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const videoAspect = VIDEO_W / VIDEO_H;
  const screenAspect = vw / vh;
  if (screenAspect > videoAspect) {
    container.style.height = vh + 'px';
    container.style.width = (vh * videoAspect) + 'px';
    container.style.marginLeft = ((vw - vh * videoAspect) / 2) + 'px';
    container.style.marginTop = '0px';
  } else {
    container.style.width = vw + 'px';
    container.style.height = (vw / videoAspect) + 'px';
    container.style.marginTop = ((vh - vw / videoAspect) / 2) + 'px';
    container.style.marginLeft = '0px';
  }
}
window.addEventListener('resize', resizeVideo);
resizeVideo();

const basePos = {
  u1:{x:10.66,y:50.40}, u2:{x:17.82,y:52.65}, u3:{x:19.05,y:39.42},
  u4:{x:71.73,y:39.15}, u5:{x:83.13,y:51.32}, u6:{x:91.22,y:49.87},
};
const MOVE = {
  u1:{dx:-3.4,dy:0.3}, u2:{dx:-2.5,dy:-0.6}, u3:{dx:-1.7,dy:0.3},
  u4:{dx:3.6,dy:0.3}, u5:{dx:2.3,dy:-0.8}, u6:{dx:1.7,dy:0.3},
};

let activated = false;
window.addEventListener('load', () => { setTimeout(showIcons, 800); });

function showIcons() {
  if (activated) return;
  activated = true;
  ['u1','u2','u3','u4','u5','u6'].forEach((id, i) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      el.style.animation = 'unitAppear 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards';
      setTimeout(() => { el.style.animation = ''; el.classList.add('float'); }, 700);
    }, i * 220);
  });
}

function trackTick() {
  const t = bgVideo.currentTime || 0;
  const dur = bgVideo.duration || 4.0;
  const progress = t <= dur/2 ? t/(dur/2) : 1 - (t-dur/2)/(dur/2);
  ['u1','u2','u3','u4','u5','u6'].forEach(id => {
    const el = document.getElementById(id);
    if (!el || !el.classList.contains('float')) return;
    const m = MOVE[id];
    el.style.left = (basePos[id].x + m.dx * progress) + '%';
    el.style.top  = (basePos[id].y + m.dy * progress) + '%';
  });
  requestAnimationFrame(trackTick);
}
requestAnimationFrame(trackTick);

// === MODAL ===
const modalData = {
  kuponok:   { icon:'🎟️', title:'KUPONOK', text:'Aktív kuponok és kedvezménykódok betöltése...' },
  akciok:    { icon:'🔥', title:'AKCIÓK', text:'Mai legjobb akciók és ajánlatok betöltése...' },
  kedvencek: { icon:'⭐', title:'KEDVENCEK', text:'Legnépszerűbb termékek betöltése...' },
  boltok:    { icon:'🏪', title:'ÁRUHÁZAK', text:'Elérhető áruházak betöltése...' },
  termekek:  { icon:'🏷️', title:'TERMÉKEK', text:'Legjobb termékek betöltése...' },
  jogi:      { icon:'🛡️', title:'JOGI', text:'Adatvédelmi információk betöltése...' },
};

function openModal(type) {
  const data = modalData[type];
  if (!data) return;
  document.getElementById('modal-icon').textContent = data.icon;
  document.getElementById('modal-title').textContent = data.title;
  document.getElementById('modal-body').innerHTML = '<div class="loading">' + data.text + '</div>';
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// === CHAT ===
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const messages = document.getElementById('chat-messages');
const typingEl = document.getElementById('typing');

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = role === 'ai'
    ? '<div class="name">INAYA</div><span>' + text + '</span>'
    : '<span>' + text + '</span>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  typingEl.style.display = 'block';
  try {
    const res = await fetch('https://h104-64.rackhostvps.com/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text, session_id: 'demo' })
    });
    const data = await res.json();
    typingEl.style.display = 'none';
    addMessage(data.response || data.message || 'Hiba történt.', 'ai');
  } catch(e) {
    typingEl.style.display = 'none';
    addMessage('Kapcsolódási hiba. Próbáld újra!', 'ai');
  }
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
</script>
</body>
</html>
